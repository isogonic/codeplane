<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <!--
    Light-mode splash. Transparent canvas + black brand chevron centered.

    Why transparent: the iOS LaunchScreen.storyboard paints
    systemBackgroundColor behind this image (white in light mode, black
    in dark mode) and contentMode=scaleAspectFill stretches us over it.
    A solid background here would defeat that adaptation. The
    Capacitor SplashScreen plugin (the very brief runtime splash that
    follows the launch screen) honours its own backgroundColor; the
    JS hides it inside MobileShell.onMount almost immediately, so any
    bg mismatch there is sub-100ms.

    The chevron path is the same brand mark used in the app icon:
      d="M64 64 L448 256 L64 448 V320 L256 256 L64 192 V64 Z"
    Bounding box: 384x384 in its own viewBox. We center it on the 2732
    canvas, sized to ~600px so the mark reads at a glance without
    dominating the launch screen the way the icon does on the home
    screen. scale=600/384 ≈ 1.5625; the path's bbox center is (256,
    256), which after scale lands at (400, 400), so we translate by
    (1366‑400, 1366‑400) = (966, 966) to put the bbox center on the
    canvas center. (Earlier I used (1066,1066) and the mark drifted
    down‑right by 100 px — easy mistake to make if you compute the
    translate from the un‑scaled top‑left rather than the scaled
    centre.)
  -->
  <g transform="translate(966 966) scale(1.5625)">
    <path
      d="M64 64L448 256L64 448V320L256 256L64 192V64Z"
      fill="#0B0D10"
    />
  </g>
</svg>
