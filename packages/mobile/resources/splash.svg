<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <!--
    Light-mode splash. Transparent canvas + black brand chevron centered.

    Why transparent: the iOS LaunchScreen.storyboard paints
    systemBackgroundColor behind this image (white in light mode, black
    in dark mode) and contentMode=scaleAspectFill stretches us over it.
    A solid background here would defeat that adaptation. The
    Capacitor SplashScreen plugin (the very brief runtime splash that
    follows the launch screen) honours its own backgroundColor; the
    JS hides it inside MobileShell.onMount almost immediately, so any
    bg mismatch there is sub-100ms.

    Sizing: scale=0.75 puts the 384px-wide chevron at 288px in user
    coords on a 2732 canvas. After iOS scaleAspectFill on a typical
    portrait phone (~1170×2532), the mark renders ≈267px wide on a
    1170-wide screen — about 23% of the screen width. The previous
    scale=1.5625 rendered closer to 47%, which dominated the launch
    screen and looked more like a splash banner than a brand mark.
    23% is roughly the proportion Material's splash spec recommends
    for a brand glyph: small enough to feel calm, large enough to read.

    The chevron path's bounding box is (64,64)–(448,448) = 384×384 in
    its own viewBox; after scale 0.75 the bbox center lands at
    (256·0.75, 256·0.75) = (192, 192), so we translate by
    (1366‑192, 1366‑192) = (1174, 1174) to put the bbox center on the
    canvas center.
  -->
  <g transform="translate(1174 1174) scale(0.75)">
    <path
      d="M64 64L448 256L64 448V320L256 256L64 192V64Z"
      fill="#0B0D10"
    />
  </g>
</svg>
