<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <!--
    Splash. Opaque brand-dark canvas (#0B0D10) + white chevron centered.

    Why opaque (was transparent in v28.1.3 and earlier): the iOS
    LaunchScreen.storyboard used to paint `systemBackgroundColor` behind
    a transparent splash image — fine on dark-mode devices, but on
    light-mode it left a stark white launch screen that flipped to the
    Capacitor SplashScreen plugin's `#0B0D10` background as soon as JS
    booted. Two distinct background colors in a sub-second window read
    as a glitch, not a smooth launch. Painting the SVG itself opaque
    (and hardcoding the storyboard backgroundColor to match) gives a
    single consistent brand-dark surface from the moment the launcher
    fades in to the moment the picker UI takes over.

    Same chevron + sizing as the previous splash — scale=0.75 puts the
    384px-wide path at 288px in user coords on the 2732 canvas, which
    renders ≈23% of phone width after iOS scaleAspectFill.
  -->
  <rect width="2732" height="2732" fill="#0B0D10"/>
  <g transform="translate(1174 1174) scale(0.75)">
    <path
      d="M64 64L448 256L64 448V320L256 256L64 192V64Z"
      fill="#FFFFFF"
    />
  </g>
</svg>
