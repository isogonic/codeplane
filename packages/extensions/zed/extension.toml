id = "codeplane"
name = "CodePlane"
description = "The open source coding agent."
version = "2.3.0"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/devinoldenburg/codeplane"

[agent_servers.codeplane]
name = "CodePlane"
icon = "./icons/codeplane.svg"

[agent_servers.codeplane.targets.darwin-aarch64]
archive = "https://github.com/devinoldenburg/codeplane/releases/download/v2.3.0/codeplane-darwin-arm64.zip"
cmd = "./codeplane"
args = ["acp"]

[agent_servers.codeplane.targets.darwin-x86_64]
archive = "https://github.com/devinoldenburg/codeplane/releases/download/v2.3.0/codeplane-darwin-x64.zip"
cmd = "./codeplane"
args = ["acp"]

[agent_servers.codeplane.targets.linux-aarch64]
archive = "https://github.com/devinoldenburg/codeplane/releases/download/v2.3.0/codeplane-linux-arm64.tar.gz"
cmd = "./codeplane"
args = ["acp"]

[agent_servers.codeplane.targets.linux-x86_64]
archive = "https://github.com/devinoldenburg/codeplane/releases/download/v2.3.0/codeplane-linux-x64.tar.gz"
cmd = "./codeplane"
args = ["acp"]

[agent_servers.codeplane.targets.windows-x86_64]
archive = "https://github.com/devinoldenburg/codeplane/releases/download/v2.3.0/codeplane-windows-x64.zip"
cmd = "./codeplane.exe"
args = ["acp"]
