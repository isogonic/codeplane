name: performance-report

description: |
  Generates a comprehensive performance report.
  Tracks build times, bundle sizes, and startup performance over time.

on:
  schedule:
    - cron: "0 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-performance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Measure build performance
        run: |
          echo "## Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "### Build Performance" >> $GITHUB_STEP_SUMMARY
          cd packages/codeplane
          START=$(date +%s.%N)
          bun script/build.ts --skip-embed-web-ui --skip-install --single
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "- CLI build time: ${DURATION}s" >> $GITHUB_STEP_SUMMARY
      - name: Measure bundle sizes
        run: |
          echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "- Binary: $(du -h packages/codeplane/dist/codeplane-linux-x64/bin/codeplane | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
          echo "- TUI bundle: $(du -sh packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/ | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
      - name: Measure startup time
        run: |
          echo "### Startup Performance" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s.%N)
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane --version
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "- Startup time: ${DURATION}s" >> $GITHUB_STEP_SUMMARY
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.json
        continue-on-error: true

  trend-analysis:
    needs: collect-performance
    runs-on: ubuntu-24.04
    steps:
      - name: Check performance trends
        run: |
          echo "::notice::Checking performance trends..."
          echo "In a real setup, compare with previous performance reports"
        continue-on-error: true
