name: performance-report

description: |
  Generates a comprehensive performance report.
  Tracks build times, bundle sizes, and startup performance over time.

on:
  schedule:
    - cron: "0 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-performance:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      # The full cross-bundle build can transiently exceed the self-hosted
      # runner's memory (OOM, exit 137). This is a reporting workflow, not a
      # gate — keep it from hard-failing the whole pipeline if the heavy build
      # is killed; the report still captures whatever did complete.
      - name: Measure build performance
        continue-on-error: true
        run: |
          echo "## Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "### Build Performance" >> $GITHUB_STEP_SUMMARY
          cd packages/codeplane
          START=$(date +%s.%N)
          bun script/build.ts --skip-embed-web-ui --skip-install --single
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "- CLI build time: ${DURATION}s" >> $GITHUB_STEP_SUMMARY
      - name: Measure bundle sizes
        continue-on-error: true
        run: |
          echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          BIN=packages/codeplane/dist/codeplane-linux-x64/bin/codeplane
          if [ -f "$BIN" ]; then
            echo "- Binary: $(du -h "$BIN" | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
            echo "- TUI bundle: $(du -sh packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/ | awk '{print $1}')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Build artifact not present (build may have been resource-limited)" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Measure startup time
        continue-on-error: true
        run: |
          echo "### Startup Performance" >> $GITHUB_STEP_SUMMARY
          BIN=packages/codeplane/dist/codeplane-linux-x64/bin/codeplane
          if [ -x "$BIN" ]; then
            START=$(date +%s.%N)
            "$BIN" --version
            END=$(date +%s.%N)
            DURATION=$(echo "$END - $START" | bc)
            echo "- Startup time: ${DURATION}s" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Binary not available to measure startup" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.json
        continue-on-error: true

  trend-analysis:
    needs: collect-performance
    runs-on: self-hosted
    steps:
      - name: Check performance trends
        run: |
          echo "::notice::Checking performance trends..."
          echo "In a real setup, compare with previous performance reports"
        continue-on-error: true
