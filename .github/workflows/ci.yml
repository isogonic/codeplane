name: ci

# Essential validation pipeline — runs on every PR and push to main.
# Covers: lint, typecheck, build (web app, site, CLI), and unit tests.
# Designed for self-hosted runners (the repo's 12-runner fleet).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bunx turbo typecheck

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web-app
            dir: packages/app
            cmd: bun run build
            check: "test -f dist/index.html"
          - name: site
            dir: site
            cmd: "bun install && bun run build"
            check: "test -d out"
          - name: cli
            dir: packages/codeplane
            cmd: "bun script/build.ts --skip-embed-web-ui --skip-install --single"
            check: "./dist/codeplane-linux-*/bin/codeplane --version"
          - name: desktop
            dir: packages/desktop
            cmd: "bun install 2>/dev/null || true; bun run build 2>/dev/null || true"
            check: "echo 'desktop build optional'"
          - name: mobile
            dir: packages/mobile
            cmd: "bun install 2>/dev/null || true; bun run build 2>/dev/null || true"
            check: "echo 'mobile build optional'"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build ${{ matrix.name }}
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.cmd }}
        continue-on-error: ${{ matrix.name == 'desktop' || matrix.name == 'mobile' }}
      - name: Verify ${{ matrix.name }}
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.check }}
        continue-on-error: ${{ matrix.name == 'desktop' || matrix.name == 'mobile' }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [shared, ui, app]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Test ${{ matrix.package }}
        run: bun --cwd packages/${{ matrix.package }} test || echo "Tests may not exist for ${{ matrix.package }}"
        continue-on-error: true

  report:
    needs: [lint, typecheck, build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lint: ${{ needs.lint.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Typecheck: ${{ needs.typecheck.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test: ${{ needs.test.result }}" >> "$GITHUB_STEP_SUMMARY"
