name: coverage-report

description: |
  Generates detailed coverage reports.
  Uploads coverage data and generates HTML reports.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-coverage:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Generate coverage
        run: |
          cd packages/codeplane
          if bun test --coverage 2>/dev/null; then
            echo "::notice::Coverage generated"
          else
            echo "::warning::Coverage generation may have failed"
          fi
        continue-on-error: true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            packages/codeplane/coverage/
            packages/codeplane/*.lcov
          retention-days: 7
        continue-on-error: true
      - name: Check coverage thresholds
        run: |
          if [ -f packages/codeplane/coverage/lcov-report/index.html ]; then
            echo "::notice::Coverage report generated"
            # Check coverage percentage
            if grep -q "80%" packages/codeplane/coverage/lcov-report/index.html; then
              echo "::notice::Coverage above 80%"
            fi
          fi
        continue-on-error: true

  coverage-summary:
    needs: generate-coverage
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage generation: ${{ needs.generate-coverage.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Coverage artifacts uploaded for detailed analysis" >> $GITHUB_STEP_SUMMARY
