name: tui-check

description: |
  Validates the TUI build and components.
  Checks that the TUI bundle is valid and components render.

on:
  push:
    branches: [main]
    paths:
      - "packages/codeplane/src/tui/**"
      - "packages/ui/**"
      - "packages/app/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/codeplane/src/tui/**"
      - "packages/ui/**"
      - "packages/app/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-tui:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build CLI with TUI
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Check TUI bundle
        run: |
          test -f packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/node-main.js
          echo "::notice::TUI bundle found"
          ls -la packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/node-main.js
      - name: Check TUI assets
        run: |
          test -d packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/
          echo "::notice::TUI assets directory found"
          ls packages/codeplane/dist/codeplane-linux-x64/bin/runtime/tui/ | head -20

  check-tui-components:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check TUI components
        run: |
          echo "TUI components:"
          ls packages/codeplane/src/tui/component/ 2>/dev/null || echo "No component directory"
          echo "::notice::TUI components checked"
        continue-on-error: true
      - name: Check TUI routes
        run: |
          echo "TUI routes:"
          ls packages/codeplane/src/tui/routes/ 2>/dev/null || echo "No routes directory"
          echo "::notice::TUI routes checked"
        continue-on-error: true

  tui-report:
    needs: [build-tui, check-tui-components]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate TUI report
        run: |
          echo "## TUI Report" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-tui.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Components: ${{ needs.check-tui-components.result }}" >> $GITHUB_STEP_SUMMARY
