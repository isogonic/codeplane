name: docs-deploy

description: |
  Deploys documentation changes automatically.
  Syncs docs with the website on every push.

on:
  push:
    branches: [main]
    paths:
      - "site/app/docs/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build site
        run: |
          cd site
          bun install
          bun run build
      - name: Copy docs
        run: |
          # Copy docs to the build output
          if [ -d docs ]; then
            cp -r docs/* site/out/ 2>/dev/null || true
            echo "::notice::Docs copied to build output"
          fi
        continue-on-error: true
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: site/out/
          retention-days: 3

  deploy-docs:
    needs: build-docs
    runs-on: self-hosted
    environment: docs
    steps:
      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: docs-out/
      - name: Deploy
        run: |
          echo "::notice::Docs would be deployed here"
          ls -la docs-out/
        continue-on-error: true

  docs-report:
    needs: [build-docs, deploy-docs]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate docs report
        run: |
          echo "## Docs Deploy Report" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-docs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy-docs.result }}" >> $GITHUB_STEP_SUMMARY
