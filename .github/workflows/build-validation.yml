name: build-validation

description: |
  Validates that all builds succeed across all platforms and configurations.
  Runs on every PR, push, and release branch.
  Also validates the build artifacts are correct.

on:
  push:
    branches: [main, dev, "release/*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      platform:
        description: "Specific platform to build"
        required: false
        type: string
        default: "all"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-web-app:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build web app
        run: |
          cd packages/app
          bun run build
      - name: Verify build output
        run: |
          ls -la packages/app/dist/
          test -f packages/app/dist/index.html || echo "::error::No index.html found"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-app-build
          path: packages/app/dist/
          retention-days: 3

  build-sdk:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build SDK
        run: |
          cd packages/sdk/js
          if [ -f script/build.ts ]; then
            bun script/build.ts
          else
            echo "No SDK build script found"
          fi
      - name: Verify SDK types
        run: |
          test -f packages/sdk/js/src/gen/sdk.gen.ts || echo "::warning::SDK types not generated"
          test -f packages/sdk/js/src/v2/gen/sdk.gen.ts || echo "::warning::SDK v2 types not generated"

  build-site:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build site
        run: |
          cd site
          bun install
          bun run build
      - name: Verify site build
        run: |
          test -d site/out || echo "::error::Site output not found"
          ls -la site/out/ | head -10

  build-cli-current-platform:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build CLI for current platform
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Verify binary
        run: |
          ls -la packages/codeplane/dist/codeplane-linux-*/bin/codeplane
          ./packages/codeplane/dist/codeplane-linux-*/bin/codeplane --version || echo "::warning::Binary version check failed"
      - name: Check binary size
        run: |
          du -h packages/codeplane/dist/codeplane-linux-*/bin/codeplane
      - name: Check TUI bundle
        run: |
          test -f packages/codeplane/dist/codeplane-linux-*/bin/runtime/tui/node-main.js || echo "::error::TUI bundle missing"

  build-desktop-shell:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build desktop shell
        run: |
          cd packages/desktop
          bun install 2>/dev/null || true
          bun run build 2>/dev/null || echo "Desktop build may require electron-builder setup"
        continue-on-error: true

  build-mobile-shell:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build mobile shell
        run: |
          cd packages/mobile
          bun install 2>/dev/null || true
          bun run build 2>/dev/null || echo "Mobile build may require native tooling"
        continue-on-error: true

  build-report:
    needs: [build-web-app, build-sdk, build-site, build-cli-current-platform, build-desktop-shell, build-mobile-shell]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate build report
        run: |
          echo "## Build Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "- Web app: ${{ needs.build-web-app.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SDK: ${{ needs.build-sdk.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Site: ${{ needs.build-site.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CLI (current platform): ${{ needs.build-cli-current-platform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Desktop shell: ${{ needs.build-desktop-shell.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile shell: ${{ needs.build-mobile-shell.result }}" >> $GITHUB_STEP_SUMMARY
