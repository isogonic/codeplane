name: post-merge-checks

description: |
  Runs checks after a PR is merged.
  Ensures the main branch remains healthy after merges.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge-health:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Install
        run: bun install
      - name: Lint
        run: bun lint
      - name: Typecheck
        run: bunx turbo typecheck
      - name: Build
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Build web app
        run: bun --cwd packages/app run build
      - name: Build site
        run: |
          cd site
          bun install
          bun run build
      - name: Smoke tests
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane --version
          echo "::notice::Post-merge smoke tests passed"
      - name: Check for regressions
        run: |
          echo "::notice::Checking for post-merge regressions..."
        continue-on-error: true

  post-merge-report:
    needs: post-merge-health
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate post-merge report
        run: |
          echo "## Post-Merge Checks" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ needs.post-merge-health.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Main branch health checked after merge" >> $GITHUB_STEP_SUMMARY
