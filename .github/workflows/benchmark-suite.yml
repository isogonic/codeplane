name: benchmark-suite

description: |
  Comprehensive benchmark suite for performance regression.
  Tracks build times, binary sizes, startup times, and more.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Benchmark build
        run: |
          cd packages/codeplane
          START=$(date +%s.%N)
          bun script/build.ts --skip-embed-web-ui --skip-install --single
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "build_time=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Build time: ${DURATION}s"
      - name: Benchmark web app build
        run: |
          cd packages/app
          START=$(date +%s.%N)
          bun run build
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "::notice::Web app build time: ${DURATION}s"

  size-benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Measure sizes
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "### Binary Sizes" >> $GITHUB_STEP_SUMMARY
          for binary in packages/codeplane/dist/*/bin/codeplane; do
            if [ -f "$binary" ]; then
              name=$(basename $(dirname $(dirname "$binary")))
              size=$(du -h "$binary" | awk '{print $1}')
              echo "- ${name}: ${size}" >> $GITHUB_STEP_SUMMARY
            fi
          done

  startup-benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Measure startup
        run: |
          echo "### Startup Times" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s.%N)
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane --version
          END=$(date +%s.%N)
          DURATION=$(echo "$END - $START" | bc)
          echo "- --version: ${DURATION}s" >> $GITHUB_STEP_SUMMARY

  benchmark-report:
    needs: [build-benchmark, size-benchmark, startup-benchmark]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Final report
        run: |
          echo "## Benchmark Suite Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Build benchmark: ${{ needs.build-benchmark.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Size benchmark: ${{ needs.size-benchmark.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Startup benchmark: ${{ needs.startup-benchmark.result }}" >> $GITHUB_STEP_SUMMARY
