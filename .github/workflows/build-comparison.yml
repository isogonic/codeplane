name: build-comparison

description: |
  Compares builds between different commits.
  Shows size differences and performance changes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base:
        description: "Base commit"
        required: true
        type: string
      head:
        description: "Head commit"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-base:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # actions/checkout cannot resolve a relative ref like HEAD~1 (it
          # does a shallow fetch of a single ref). Fetch full history, then
          # check out the parent commit explicitly.
          ref: ${{ inputs.base || github.event.before || '' }}
          fetch-depth: 0
      - name: Resolve base commit
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.base || github.event.before || '' }}" ]; then
            git checkout "$(git rev-parse HEAD~1)"
          fi
      - uses: ./.github/actions/setup-bun
      - name: Build base
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
          du -h dist/codeplane-linux-x64/bin/codeplane > base-size.txt
      - name: Upload base
        uses: actions/upload-artifact@v4
        with:
          name: build-base
          path: packages/codeplane/base-size.txt
          retention-days: 1

  build-head:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head || github.sha }}
      - uses: ./.github/actions/setup-bun
      - name: Build head
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
          du -h dist/codeplane-linux-x64/bin/codeplane > head-size.txt
      - name: Upload head
        uses: actions/upload-artifact@v4
        with:
          name: build-head
          path: packages/codeplane/head-size.txt
          retention-days: 1

  compare:
    needs: [build-base, build-head]
    runs-on: self-hosted
    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
      - name: Compare
        run: |
          echo "## Build Comparison" >> $GITHUB_STEP_SUMMARY
          if [ -f base-size.txt ] && [ -f head-size.txt ]; then
            echo "### Base ($(cat base-size.txt))" >> $GITHUB_STEP_SUMMARY
            echo "### Head ($(cat head-size.txt))" >> $GITHUB_STEP_SUMMARY
          else
            echo "Size files not found" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true
