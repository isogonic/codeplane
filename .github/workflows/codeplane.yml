name: codeplane

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  codeplane:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /codeplane') ||
      startsWith(github.event.comment.body, '/codeplane')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run codeplane
        uses: devinoldenburg/codeplane/github@latest
        env:
          CODEPLANE_API_KEY: ${{ secrets.CODEPLANE_API_KEY }}
          CODEPLANE_PERMISSION: '{"bash": "deny"}'
        with:
          model: codeplane/claude-opus-4-5
