name: stale-dependency-check

description: |
  Checks for stale dependencies that haven't been updated in a while.
  Also checks for dependencies that are no longer maintained.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-stale:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          bun outdated 2>/dev/null || echo "bun outdated not available"
        continue-on-error: true
      - name: Check for unmaintained packages
        run: |
          echo "::notice::Checking for unmaintained packages..."
          # Check npm for last publish dates
          for pkg in $(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).join(' '))"); do
            last_update=$(curl -s "https://registry.npmjs.org/${pkg}" | jq -r '.time.modified // "unknown"')
            echo "  ${pkg}: last updated ${last_update}"
          done
        continue-on-error: true
      - name: Check for deprecated packages
        run: |
          echo "::notice::Checking for deprecated packages..."
          for pkg in $(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).join(' '))"); do
            deprecated=$(curl -s "https://registry.npmjs.org/${pkg}" | jq -r '.deprecated // empty')
            if [ -n "$deprecated" ]; then
              echo "::warning::${pkg} is deprecated: ${deprecated}"
            fi
          done
        continue-on-error: true

  report-stale:
    needs: check-stale
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate stale dependency report
        run: |
          echo "## Stale Dependency Report" >> $GITHUB_STEP_SUMMARY
          echo "Stale dependency check completed" >> $GITHUB_STEP_SUMMARY
          echo "Review the logs for details on outdated and unmaintained packages." >> $GITHUB_STEP_SUMMARY
