name: release-orchestrator

description: |
  Orchestrates the full release: resolves the tag, waits for the npm publish
  to land on the registry, then verifies the meta + platform packages are
  installable and reports a consolidated status.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to orchestrate (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-orchestrator-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: self-hosted
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.event.release.tag_name || github.ref_name }}"
          if [ -z "$tag" ]; then
            echo "A release tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  wait-npm:
    needs: resolve
    runs-on: self-hosted
    steps:
      - name: Wait for codeplane-ai on npm
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 40); do
            if npm view "codeplane-ai@${VERSION}" version >/dev/null 2>&1; then
              echo "codeplane-ai@${VERSION} is live on npm"
              exit 0
            fi
            echo "Attempt ${attempt}: codeplane-ai@${VERSION} not yet on npm, waiting 30s..."
            sleep 30
          done
          echo "::error::codeplane-ai@${VERSION} did not appear on npm in time" >&2
          exit 1

  verify-platform-packages:
    needs: [resolve, wait-npm]
    runs-on: self-hosted
    steps:
      - name: Verify platform packages published
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          packages="codeplane-linux-x64 codeplane-linux-arm64 codeplane-darwin-x64 codeplane-darwin-arm64 codeplane-windows-x64"
          missing=""
          for p in $packages; do
            if npm view "${p}@${VERSION}" version >/dev/null 2>&1; then
              echo "OK  ${p}@${VERSION}"
            else
              echo "MISSING  ${p}@${VERSION}"
              missing="${missing} ${p}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing platform packages:${missing}" >&2
            exit 1
          fi

  report:
    needs: [resolve, wait-npm, verify-platform-packages]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Orchestration summary
        shell: bash
        run: |
          {
            echo "## Release Orchestration — ${{ needs.resolve.outputs.tag }}"
            echo "- npm wait: ${{ needs.wait-npm.result }}"
            echo "- platform packages: ${{ needs.verify-platform-packages.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
