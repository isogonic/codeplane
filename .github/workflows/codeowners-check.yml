name: codeowners-check

description: |
  Validates the CODEOWNERS file is correct.
  Ensures all paths have owners.

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeowners:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check CODEOWNERS exists
        run: |
          if [ -f .github/CODEOWNERS ]; then
            echo "CODEOWNERS file exists"
          else
            echo "::warning::No CODEOWNERS file found — consider adding one"
          fi
      - name: Validate CODEOWNERS syntax
        run: |
          if [ -f .github/CODEOWNERS ]; then
            echo "Validating CODEOWNERS structure"
            while IFS= read -r line; do
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              echo "Checking: $line"
            done < .github/CODEOWNERS
            echo "check complete"
          else
            echo "::warning::No CODEOWNERS file found"
          fi
      - name: Verify owners exist
        run: |
          echo "Checking owner validity"
