name: canary-deploy

description: |
  Canary deployment that rolls out to 10% of users first.
  Monitors error rates and performance before full rollout.
  If canary fails, automatically rolls back.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      canary_percentage:
        description: "Canary percentage (1-100)"
        required: false
        default: "10"
        type: string
      duration:
        description: "Canary duration in minutes"
        required: false
        default: "30"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: canary-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  deploy-canary:
    runs-on: ubuntu-24.04
    environment: canary
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build canary release
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "${{ github.ref_name }}"
      - name: Deploy to canary
        run: |
          PERCENTAGE="${{ inputs.canary_percentage || '10' }}"
          echo "::notice::Deploying to ${PERCENTAGE}% of traffic (canary)"
          # In a real setup: update CDN config, load balancer, or edge deployment
      - name: Monitor canary
        run: |
          DURATION="${{ inputs.duration || '30' }}"
          echo "::notice::Monitoring canary for ${DURATION} minutes"
          sleep $((DURATION * 60))
        timeout-minutes: 60

  canary-health-check:
    needs: deploy-canary
    runs-on: ubuntu-24.04
    steps:
      - name: Check error rates
        run: |
          echo "::notice::Checking canary error rates"
          # In a real setup: query monitoring dashboard
          # If error rate > threshold, fail
      - name: Check performance
        run: |
          echo "::notice::Checking canary performance metrics"
          # In a real setup: query performance metrics

  promote-or-rollback:
    needs: canary-health-check
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Decide promote or rollback
        run: |
          if [ "${{ needs.canary-health-check.result }}" == "success" ]; then
            echo "::notice::Canary healthy — promoting to 100%"
            # Promote: update CDN, load balancer, etc.
          else
            echo "::error::Canary unhealthy — rolling back"
            # Rollback: revert to previous stable version
            # In a real setup: revert deployment, update CDN
          fi
