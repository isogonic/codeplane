name: i18n-check

description: |
  Validates internationalization files.
  Ensures all languages have the same keys and no missing translations.

on:
  push:
    branches: [main]
    paths:
      - "packages/app/src/i18n/**"
      - "packages/ui/src/i18n/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/app/src/i18n/**"
      - "packages/ui/src/i18n/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-translations:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: List all translation files
        run: |
          echo "## Translation Files" >> $GITHUB_STEP_SUMMARY
          for dir in packages/app/src/i18n packages/ui/src/i18n; do
            if [ -d "$dir" ]; then
              echo "### $(basename $(dirname $dir))" >> $GITHUB_STEP_SUMMARY
              for file in "$dir"/*.ts; do
                if [ -f "$file" ]; then
                  echo "- $(basename $file)" >> $GITHUB_STEP_SUMMARY
                fi
              done
            fi
          done
      - name: Check for missing translations
        run: |
          for dir in packages/app/src/i18n packages/ui/src/i18n; do
            if [ -d "$dir" ]; then
              EN_FILE="$dir/en.ts"
              if [ -f "$EN_FILE" ]; then
                echo "Checking translations in $(dirname $dir)"
                for other in "$dir"/*.ts; do
                  if [ "$other" != "$EN_FILE" ] && [ -f "$other" ]; then
                    echo "  $(basename $other)"
                  fi
                done
              fi
            fi
          done
        continue-on-error: true
      - name: Check for outdated translations
        run: |
          echo "::notice::Checking for outdated translations..."
        continue-on-error: true

  i18n-report:
    needs: [check-translations]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate i18n report
        run: |
          echo "## Internationalization Report" >> $GITHUB_STEP_SUMMARY
          echo "- Translation check: ${{ needs.check-translations.result }}" >> $GITHUB_STEP_SUMMARY
