name: documentation-check

description: |
  Checks that all code is properly documented.
  Validates JSDoc comments, README files, and inline docs.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check for README files
        run: |
          for pkg in packages/*/; do
            if [ ! -f "$pkg/README.md" ] && [ ! -f "$pkg/README" ]; then
              echo "::warning::$(basename $pkg) missing README.md"
            fi
          done
      - name: Check for JSDoc comments
        run: |
          # Count files with JSDoc
          JSDOC_COUNT=$(grep -r "^\s*\/\*\*" --include="*.ts" packages/ | wc -l)
          echo "::notice::Found ${JSDOC_COUNT} JSDoc comments"
        continue-on-error: true
      - name: Check for inline docs
        run: |
          # Count inline comments
          COMMENT_COUNT=$(grep -r "^\s*//" --include="*.ts" packages/ | wc -l)
          echo "::notice::Found ${COMMENT_COUNT} inline comments"
        continue-on-error: true
      - name: Check AGENTS.md
        run: |
          if [ -f AGENTS.md ]; then
            echo "::notice::AGENTS.md exists"
            wc -l AGENTS.md
          else
            echo "::warning::AGENTS.md not found"
          fi
      - name: Check CONTRIBUTING.md
        run: |
          if [ -f CONTRIBUTING.md ]; then
            echo "::notice::CONTRIBUTING.md exists"
          else
            echo "::warning::CONTRIBUTING.md not found"
          fi
      - name: Check for stale docs
        run: |
          # Check if docs reference old versions
          if grep -r "v28\." site/ docs/ 2>/dev/null; then
            echo "::warning::Found references to old v28.x versions"
          fi
        continue-on-error: true
