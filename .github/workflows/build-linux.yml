name: build-linux

description: |
  Builds Linux binaries for x64 and arm64.
  Validates the binaries work correctly.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-x64:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build Linux x64
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Verify binary exists
        run: |
          test -f packages/codeplane/dist/codeplane-linux-x64/bin/codeplane
          echo "Linux x64 binary built"
      - name: Test binary execution
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane --version
      - name: Check binary is ELF
        run: |
          if file packages/codeplane/dist/codeplane-linux-x64/bin/codeplane | grep -q ELF; then
            echo "Binary is valid ELF executable"
          else
            echo "::warning::Binary may not be valid ELF"
          fi
      - name: Check binary size
        run: |
          SIZE=$(du -h packages/codeplane/dist/codeplane-linux-x64/bin/codeplane | cut -f1)
          echo "Binary size: $SIZE"
          echo "Linux x64 binary: $SIZE" >> $GITHUB_STEP_SUMMARY
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: codeplane-linux-x64-bin
          path: packages/codeplane/dist/codeplane-linux-x64/bin/codeplane
          retention-days: 7
      - name: Build Linux arm64 (cross-compile)
        run: |
          cd packages/codeplane
          echo "Cross-compilation would require additional setup"
          echo "::warning::ARM64 cross-compilation skipped on self-hosted x64 runner"
      - name: Summary
        run: |
          echo "Build complete"
