name: rollback

description: |
  Emergency rollback pipeline.
  Reverts the npm dist-tag to the previous stable version
  and optionally unpublishes the broken release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to rollback (e.g., 31.1.0)"
        required: true
        type: string
      target_version:
        description: "Version to rollback to (e.g., 31.0.9)"
        required: true
        type: string
      unpublish:
        description: "Unpublish the broken version (24h window)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  validate-rollback:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Validate versions
        run: |
          BROKEN="${{ inputs.version }}"
          TARGET="${{ inputs.target_version }}"
          echo "::notice::Rolling back from ${BROKEN} to ${TARGET}"
          # Verify target version exists
          if curl -s "https://registry.npmjs.org/codeplane-ai/${TARGET}" | grep -q "not found"; then
            echo "::error::Target version ${TARGET} not found on npm"
            exit 1
          fi

  rollback-npm:
    needs: validate-rollback
    runs-on: self-hosted
    environment: rollback
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Configure npm
        run: printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Update dist-tag to target version
        run: |
          TARGET="${{ inputs.target_version }}"
          npm dist-tag add codeplane-ai@${TARGET} latest
          echo "::notice::Updated latest tag to ${TARGET}"
      - name: Unpublish broken version (if requested)
        if: inputs.unpublish == true
        run: |
          BROKEN="${{ inputs.version }}"
          echo "::warning::Unpublishing codeplane-ai@${BROKEN}"
          npm unpublish codeplane-ai@${BROKEN} --force || echo "Unpublish may have failed (version > 24h old)"
        continue-on-error: true

  rollback-github:
    needs: validate-rollback
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BROKEN="${{ inputs.version }}"
          TARGET="${{ inputs.target_version }}"
          # Mark the broken release as pre-release
          gh release edit "v${BROKEN}" --repo "${{ github.repository }}" --prerelease || true
          # Update the latest release
          gh release edit "v${TARGET}" --repo "${{ github.repository }}" --latest || true
          echo "::notice::Updated GitHub releases"

  notify-rollback:
    needs: [rollback-npm, rollback-github]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Notify
        run: |
          echo "::notice::Rollback complete"
          echo "::notice::Rolled back from ${{ inputs.version }} to ${{ inputs.target_version }}"
