name: install-script-check

description: |
  Validates the installation scripts (curl, npm, etc.).
  Ensures install scripts work correctly across platforms.

on:
  push:
    branches: [main]
    paths:
      - "docs/install"
      - "packages/codeplane/script/postinstall.mjs"
      - "packages/codeplane/bin/**"
  pull_request:
    branches: [main]
    paths:
      - "docs/install"
      - "packages/codeplane/script/postinstall.mjs"
      - "packages/codeplane/bin/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-install-script:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check curl install script
        run: |
          if [ -f docs/install ]; then
            echo "::notice::Install script found"
            head -20 docs/install
            # Check for correct repository references
            if grep -q "isogonic/codeplane" docs/install; then
              echo "::notice::Install script references correct repo"
            else
              echo "::warning::Install script may reference old repo"
            fi
          else
            echo "::warning::Install script not found"
          fi
        continue-on-error: true
      - name: Check postinstall script
        run: |
          if [ -f packages/codeplane/script/postinstall.mjs ]; then
            echo "::notice::Postinstall script found"
            head -30 packages/codeplane/script/postinstall.mjs
          else
            echo "::warning::Postinstall script not found"
          fi
        continue-on-error: true
      - name: Check wrapper script
        run: |
          if [ -f packages/codeplane/bin/codeplane ]; then
            echo "::notice::Wrapper script found"
            head -20 packages/codeplane/bin/codeplane
          else
            echo "::warning::Wrapper script not found"
          fi
        continue-on-error: true

  test-install:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Simulate npm install
        run: |
          mkdir -p /tmp/test-install
          cd /tmp/test-install
          npm init -y
          npm install codeplane-ai@latest || echo "npm install may fail in test"
          echo "::notice::Install simulation complete"
        continue-on-error: true

  install-report:
    needs: [check-install-script, test-install]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate install report
        run: |
          echo "## Install Script Report" >> $GITHUB_STEP_SUMMARY
          echo "- Script check: ${{ needs.check-install-script.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test install: ${{ needs.test-install.result }}" >> $GITHUB_STEP_SUMMARY
