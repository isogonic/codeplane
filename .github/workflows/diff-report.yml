name: diff-report

description: |
  Generates detailed diff reports for PRs.
  Shows what changed in a visual and detailed format.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-diff:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate diff stats
        run: |
          echo "## Diff Report" >> diff-report.md
          echo "" >> diff-report.md
          echo "### Files Changed" >> diff-report.md
          git diff --stat origin/main | tail -1 >> diff-report.md
          echo "" >> diff-report.md
          echo "### File List" >> diff-report.md
          echo "| File | Status | +/- |" >> diff-report.md
          echo "|------|--------|-----|" >> diff-report.md
          git diff --stat origin/main | head -n -1 | awk '{print "| " $1 " | " $2 " | " $3 " |"}' >> diff-report.md
          echo "" >> diff-report.md
          echo "### Top Contributors" >> diff-report.md
          git shortlog -sn origin/main..HEAD >> diff-report.md
          cat diff-report.md
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file diff-report.md
        continue-on-error: true

  check-breaking:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for breaking changes
        run: |
          echo "::notice::Checking for breaking changes..."
          # Check for API changes
          if git diff origin/main --name-only | grep -q "packages/sdk/openapi.json"; then
            echo "::warning::API schema changed — may be breaking"
          fi
          # Check for config changes
          if git diff origin/main --name-only | grep -q "packages/codeplane/src/config/"; then
            echo "::warning::Config schema changed — may be breaking"
          fi
        continue-on-error: true
