name: githooks

description: |
  Validates githooks and pre-commit checks.
  Ensures hooks are installed and working correctly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-hooks:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check for githooks
        run: |
          if [ -d .husky ]; then
            echo "::notice::Husky directory found"
            ls -la .husky/
          else
            echo "::warning::No .husky directory found"
          fi
      - name: Check pre-commit hook
        run: |
          if [ -f .husky/pre-commit ]; then
            echo "::notice::pre-commit hook found"
            cat .husky/pre-commit
          else
            echo "::warning::No pre-commit hook found"
          fi
      - name: Check pre-push hook
        run: |
          if [ -f .husky/pre-push ]; then
            echo "::notice::pre-push hook found"
            cat .husky/pre-push
          else
            echo "::warning::No pre-push hook found"
          fi
      - name: Check commit-msg hook
        run: |
          if [ -f .husky/commit-msg ]; then
            echo "::notice::commit-msg hook found"
            cat .husky/commit-msg
          else
            echo "::warning::No commit-msg hook found"
          fi
        continue-on-error: true
      - name: Simulate hook run
        run: |
          echo "::notice::Simulating pre-commit hook..."
          bun lint || echo "Lint may fail during simulation"
        continue-on-error: true
