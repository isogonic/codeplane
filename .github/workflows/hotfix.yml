name: hotfix

description: |
  Hotfix release pipeline for critical bug fixes.
  Creates a hotfix branch from the latest release tag,
  applies the fix, builds, and publishes immediately.

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Target version to hotfix (e.g., 31.1.0)"
        required: true
        type: string
      fix_description:
        description: "Description of the fix"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: hotfix-${{ inputs.target_version }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  create-hotfix-branch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create hotfix branch
        run: |
          set -euo pipefail
          TARGET="${{ inputs.target_version }}"
          HOTFIX_VERSION="${TARGET}-hotfix.1"
          git checkout -b "hotfix/${HOTFIX_VERSION}" "v${TARGET}"
          echo "::notice::Created hotfix branch: hotfix/${HOTFIX_VERSION} from v${TARGET}"

  build-hotfix:
    needs: create-hotfix-branch
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform: [darwin-arm64, darwin-x64, linux-arm64, linux-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build hotfix
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "${{ inputs.target_version }}-hotfix.1"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-${{ matrix.platform }}
          path: packages/codeplane/dist/codeplane-${{ matrix.platform }}-
          retention-days: 7

  publish-hotfix:
    needs: build-hotfix
    runs-on: ubuntu-24.04
    environment: hotfix
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Configure npm
        run: printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hotfix-*
          merge-multiple: true
      - name: Publish hotfix
        run: |
          VERSION="${{ inputs.target_version }}-hotfix.1"
          for dir in packages/codeplane/dist/codeplane-*; do
            if [ -d "$dir" ]; then
              node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('${dir}/package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('${dir}/package.json', JSON.stringify(p,null,2)+'\n');"
              cd "$dir"
              npm publish --tag hotfix --access public
              cd - >/dev/null
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-hotfix-release:
    needs: publish-hotfix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create hotfix release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.target_version }}-hotfix.1"
          gh release create "v${VERSION}" \
            --target "${{ github.sha }}" \
            --title "Hotfix ${VERSION}" \
            --notes "Hotfix for ${{ inputs.target_version }}\n\n${{ inputs.fix_description }}\n\nInstall with: \`npm install -g codeplane-ai@${VERSION}\`" \
            --prerelease

  notify-hotfix:
    needs: create-hotfix-release
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Notify
        run: |
          echo "::notice::Hotfix ${{ inputs.target_version }}-hotfix.1 published"
          echo "::notice::Fix: ${{ inputs.fix_description }}"
