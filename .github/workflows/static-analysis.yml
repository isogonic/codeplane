name: static-analysis

description: |
  Runs static analysis tools on the codebase.
  Checks for code smells, complexity, and anti-patterns.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-code:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check for code smells
        run: |
          echo "Checking for code smells..."
          # Check for TODO comments
          TODO_COUNT=$(grep -r "TODO\|FIXME\|XXX" --include="*.ts" --include="*.tsx" packages/ | grep -v "node_modules" | wc -l)
          echo "TODO/FIXME/XXX comments: ${TODO_COUNT}"
          # Check for long functions
          echo "::notice::Code smell check complete"
        continue-on-error: true
      - name: Check complexity
        run: |
          echo "Checking code complexity..."
          # Check for deeply nested code
          if grep -r "if.*{.*if.*{.*if.*{.*if" --include="*.ts" packages/ | grep -v "node_modules"; then
            echo "::warning::Deeply nested code found"
          fi
          # Check for long files
          for file in $(find packages -name "*.ts" -not -path "*/node_modules/*" | xargs wc -l | sort -rn | head -10 | awk '{print $2}'); do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              echo "  ${file}: ${lines} lines"
              if [ "$lines" -gt 500 ]; then
                echo "::warning::${file} is very long (${lines} lines)"
              fi
            fi
          done
        continue-on-error: true
      - name: Check for anti-patterns
        run: |
          echo "Checking for anti-patterns..."
          # Check for any usage
          if grep -r "as any" --include="*.ts" packages/ | grep -v "node_modules" | head -10; then
            echo "::warning::Found 'as any' usage"
          fi
          # Check for console.log
          if grep -r "console.log" --include="*.ts" --include="*.tsx" packages/ | grep -v "node_modules" | grep -v "test" | head -10; then
            echo "::warning::Found console.log usage"
          fi
        continue-on-error: true

  static-analysis-report:
    needs: analyze-code
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate analysis report
        run: |
          echo "## Static Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "- Code analysis: ${{ needs.analyze-code.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Check logs for code smells, complexity, and anti-patterns" >> $GITHUB_STEP_SUMMARY
