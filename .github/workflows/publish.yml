name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  push:
    branches:
      - ci
      - dev
      - beta
      - snapshot-*
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'devinoldenburg/codeplane'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          codeplane-app-id: ${{ vars.CODEPLANE_APP_ID }}
          codeplane-app-secret: ${{ secrets.CODEPLANE_APP_SECRET }}

      - name: Install CodePlane
        if: inputs.bump || inputs.version
        run: bun i -g codeplane-ai

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
          CODEPLANE_BUMP: ${{ inputs.bump }}
          CODEPLANE_VERSION: ${{ inputs.version }}
          CODEPLANE_API_KEY: ${{ secrets.CODEPLANE_API_KEY }}
          GH_REPO: ${{ (github.ref_name == 'beta' && 'devinoldenburg/codeplane-beta') || github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-cli:
    needs: version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'devinoldenburg/codeplane'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          codeplane-app-id: ${{ vars.CODEPLANE_APP_ID }}
          codeplane-app-secret: ${{ secrets.CODEPLANE_APP_SECRET }}

      - name: Build
        id: build
        run: |
          ./packages/codeplane/script/build.ts
        env:
          CODEPLANE_VERSION: ${{ needs.version.outputs.version }}
          CODEPLANE_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: codeplane-cli
          path: |
            packages/codeplane/dist/codeplane-darwin*
            packages/codeplane/dist/codeplane-linux*

      - uses: actions/upload-artifact@v4
        with:
          name: codeplane-cli-windows
          path: packages/codeplane/dist/codeplane-windows*
    outputs:
      version: ${{ needs.version.outputs.version }}

  build-desktop:
    needs: version
    if: github.repository == 'devinoldenburg/codeplane'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: mac
          - os: ubuntu-2404
            target: linux
          - os: windows-2025
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Build desktop bundle
        working-directory: packages/desktop
        run: bun run build
        env:
          CODEPLANE_VERSION: ${{ needs.version.outputs.version }}

      - name: Package desktop binaries
        working-directory: packages/desktop
        # electron-builder publishes to GitHub releases when --publish always
        # is set and GH_TOKEN is in scope; the release tag was already created
        # by the version job so the binaries get attached to the existing
        # draft release alongside the CLI archives.
        run: bun run package:${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEPLANE_VERSION: ${{ needs.version.outputs.version }}
          # Skip macOS notarization in this pipeline; can be wired up later by
          # adding APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID to
          # the workflow secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload desktop binaries to release
        if: needs.version.outputs.release != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd packages/desktop/release
          for file in $(ls -1 codeplane-desktop-* 2>/dev/null || true); do
            echo "Uploading $file"
            gh release upload "v${{ needs.version.outputs.version }}" "$file" \
              --clobber --repo "${{ needs.version.outputs.repo }}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: codeplane-desktop-${{ matrix.target }}
          path: packages/desktop/release/codeplane-desktop-*

  sign-cli-windows:
    needs:
      - build-cli
      - version
    runs-on: blacksmith-4vcpu-windows-2025
    if: github.repository == 'devinoldenburg/codeplane'
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: codeplane-cli-windows
          path: packages/codeplane/dist

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          codeplane-app-id: ${{ vars.CODEPLANE_APP_ID }}
          codeplane-app-secret: ${{ secrets.CODEPLANE_APP_SECRET }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-arm64\bin\codeplane.exe
            ${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64\bin\codeplane.exe
            ${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64-baseline\bin\codeplane.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Windows CLI signatures
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-arm64\bin\codeplane.exe",
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64\bin\codeplane.exe",
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64-baseline\bin\codeplane.exe"
          )

          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature $file
            if ($sig.Status -ne "Valid") {
              throw "Invalid signature for ${file}: $($sig.Status)"
            }
          }

      - name: Repack Windows CLI archives
        working-directory: packages/codeplane/dist
        shell: pwsh
        run: |
          Compress-Archive -Path "codeplane-windows-arm64\bin\*" -DestinationPath "codeplane-windows-arm64.zip" -Force
          Compress-Archive -Path "codeplane-windows-x64\bin\*" -DestinationPath "codeplane-windows-x64.zip" -Force
          Compress-Archive -Path "codeplane-windows-x64-baseline\bin\*" -DestinationPath "codeplane-windows-x64-baseline.zip" -Force

      - name: Upload signed Windows CLI release assets
        if: needs.version.outputs.release != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" `
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-arm64.zip" `
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64.zip" `
            "${{ github.workspace }}\packages\codeplane\dist\codeplane-windows-x64-baseline.zip" `
            --clobber `
            --repo "${{ needs.version.outputs.repo }}"

      - uses: actions/upload-artifact@v4
        with:
          name: codeplane-cli-signed-windows
          path: |
            packages/codeplane/dist/codeplane-windows-arm64
            packages/codeplane/dist/codeplane-windows-x64
            packages/codeplane/dist/codeplane-windows-x64-baseline

  publish:
    needs:
      - version
      - build-cli
      - sign-cli-windows
    if: always() && !failure() && !cancelled()
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          codeplane-app-id: ${{ vars.CODEPLANE_APP_ID }}
          codeplane-app-secret: ${{ secrets.CODEPLANE_APP_SECRET }}

      - uses: actions/download-artifact@v4
        with:
          name: codeplane-cli
          path: packages/codeplane/dist

      - uses: actions/download-artifact@v4
        with:
          name: codeplane-cli-windows
          path: packages/codeplane/dist

      - uses: actions/download-artifact@v4
        with:
          name: codeplane-cli-signed-windows
          path: packages/codeplane/dist

      - name: Cache apt packages (AUR)
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-aur-${{ hashFiles('.github/workflows/publish.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-aur-

      - name: Setup SSH for AUR
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.email "codeplane@sst.dev"
          git config --global user.name "codeplane"
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts || true

      - run: ./script/publish.ts
        env:
          CODEPLANE_VERSION: ${{ needs.version.outputs.version }}
          CODEPLANE_RELEASE: ${{ needs.version.outputs.release }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GITHUB_TOKEN: ${{ steps.committer.outputs.token }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          NPM_CONFIG_PROVENANCE: false
