name: secret-rotation

description: |
  Reminds about secret rotation and checks for expired secrets.
  Also checks for secrets that should be rotated.

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  secrets: read

jobs:
  check-secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check secret age
        run: |
          echo "::notice::Checking secrets..."
          # Check GitHub secrets
          echo "Secrets that should be rotated periodically:"
          echo "- NPM_TOKEN"
          echo "- HOMEBREW_TAP_TOKEN"
          echo "- APPLE_ID_PASSWORD"
          echo "- WINDOWS_CERTIFICATE"
          echo "- GITHUB_TOKEN"
          echo "::notice::Consider rotating these secrets quarterly"
      - name: Check for expired tokens
        run: |
          echo "::notice::Checking for expired tokens..."
          # In a real setup, check token expiration dates
        continue-on-error: true
      - name: Create reminder
        run: |
          echo "## Secret Rotation Reminder" >> $GITHUB_STEP_SUMMARY
          echo "The following secrets should be rotated periodically:" >> $GITHUB_STEP_SUMMARY
          echo "- NPM_TOKEN" >> $GITHUB_STEP_SUMMARY
          echo "- HOMEBREW_TAP_TOKEN" >> $GITHUB_STEP_SUMMARY
          echo "- APPLE_ID_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo "- WINDOWS_CERTIFICATE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Consider rotating these secrets quarterly." >> $GITHUB_STEP_SUMMARY
