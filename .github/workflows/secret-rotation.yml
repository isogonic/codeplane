name: secret-rotation

description: |
  Reminds maintainers to rotate secrets periodically.
  Runs on a monthly schedule.

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind-rotation:
    runs-on: self-hosted
    steps:
      - name: Secret rotation reminder
        run: |
          echo "::notice::Monthly secret rotation reminder"
          echo "Secrets to review: NPM_TOKEN, HOMEBREW_TAP_TOKEN, GITHUB_TOKEN"
      - name: List secrets to rotate
        run: |
          echo "Checking secret age"
          echo "- NPM_TOKEN"
          echo "- HOMEBREW_TAP_TOKEN"
      - name: Report
        run: |
          echo "complete"
          echo "Secrets checked"
