name: auto-merge

description: |
  Auto-merges PRs that pass all checks and have required approvals.
  Also handles dependabot and bot PRs automatically.

on:
  pull_request:
    branches: [main]
    types: [labeled, unlabeled, synchronize, opened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-24.04
    if: |
      github.event.pull_request.draft == false &&
      (github.event.pull_request.user.login == 'dependabot[bot]' ||
       github.event.pull_request.user.login == 'github-actions[bot]' ||
       contains(github.event.pull_request.labels.*.name, 'auto-merge'))
    steps:
      - uses: actions/checkout@v4
      - name: Wait for checks
        run: |
          echo "::notice::Waiting for all checks to pass before auto-merge"
          sleep 30
        continue-on-error: true
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash
        continue-on-error: true

  check-merge-readiness:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request_review'
    steps:
      - name: Check if PR is ready
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if PR has required approvals
          REVIEWS=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json reviews -q '.reviews | map(select(.state == "APPROVED")) | length')
          echo "::notice::PR has ${REVIEWS} approvals"
          if [ "$REVIEWS" -ge 1 ]; then
            echo "::notice::PR is ready for merge"
          fi
        continue-on-error: true
