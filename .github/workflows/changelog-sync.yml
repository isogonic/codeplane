name: changelog-sync

description: |
  Ensures CHANGELOG.md is in sync with actual changes.
  Warns when changes are made without updating the changelog.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changelog updates
        run: |
          if [ -f CHANGELOG.md ]; then
            # Check if changelog was updated in the last 5 commits
            if git log --oneline -5 --name-only | grep -q "CHANGELOG.md"; then
              echo "::notice::CHANGELOG.md was recently updated"
            else
              echo "::warning::CHANGELOG.md not updated in recent commits"
            fi
          else
            echo "::warning::CHANGELOG.md not found"
          fi
        continue-on-error: true
      - name: Check for version entries
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION=$(grep -oP '## \[\K[^\]]+' CHANGELOG.md | head -1)
            echo "::notice::Latest version in changelog: ${VERSION}"
          fi
        continue-on-error: true
      - name: Check for unreleased changes
        run: |
          if [ -f CHANGELOG.md ] && grep -q "## Unreleased" CHANGELOG.md; then
            echo "::notice::Unreleased section found"
          else
            echo "::warning::No Unreleased section in CHANGELOG.md"
          fi
        continue-on-error: true

  changelog-report:
    needs: [check-sync]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate changelog report
        run: |
          echo "## Changelog Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "- Changelog sync: ${{ needs.check-sync.result }}" >> $GITHUB_STEP_SUMMARY
