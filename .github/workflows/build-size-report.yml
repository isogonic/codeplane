name: build-size-report

description: |
  Generates a detailed report of build sizes across all platforms.
  Tracks trends and alerts on significant increases.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-all:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build all platforms
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "size-report"
      - name: Measure sizes
        run: |
          echo "# Build Size Report" > size-report.md
          echo "" >> size-report.md
          echo "## Binaries" >> size-report.md
          echo "" >> size-report.md
          for binary in packages/codeplane/dist/*/bin/codeplane; do
            if [ -f "$binary" ]; then
              size=$(du -h "$binary" | awk '{print $1}')
              name=$(basename $(dirname $(dirname "$binary")))
              echo "- ${name}: ${size}" >> size-report.md
            fi
          done
          echo "" >> size-report.md
          echo "## TUI Bundles" >> size-report.md
          echo "" >> size-report.md
          for tui in packages/codeplane/dist/*/bin/runtime/tui/; do
            if [ -d "$tui" ]; then
              size=$(du -sh "$tui" | awk '{print $1}')
              name=$(basename $(dirname $(dirname $(dirname $(dirname "$tui")))))
              echo "- ${name}: ${size}" >> size-report.md
            fi
          done
          echo "" >> size-report.md
          echo "## Web App" >> size-report.md
          echo "" >> size-report.md
          if [ -d packages/app/dist ]; then
            size=$(du -sh packages/app/dist | awk '{print $1}')
            echo "- packages/app/dist: ${size}" >> size-report.md
          fi
          cat size-report.md
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: size-report.md
          retention-days: 30
      - name: Post summary
        run: |
          cat size-report.md >> $GITHUB_STEP_SUMMARY
