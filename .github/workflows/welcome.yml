name: welcome

description: |
  Posts a welcome message on new PRs and issues.
  Provides helpful links and guidelines for contributors.

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome-pr:
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Post welcome message
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "👋 Thanks for the PR!\n\nBefore we review, please make sure:\n- [ ] Tests pass (`bun test`)\n- [ ] Typecheck passes (`bun turbo typecheck`)\n- [ ] Lint passes (`bun lint`)\n- [ ] Docs are updated if user-facing behavior changed\n\nCheck our [contributing guide](https://github.com/isogonic/codeplane/blob/main/CONTRIBUTING.md) for more details."
        continue-on-error: true

  welcome-issue:
    runs-on: self-hosted
    if: github.event_name == 'issues'
    steps:
      - uses: actions/checkout@v4
      - name: Post welcome message
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "👋 Thanks for opening this issue!\n\nWe'll triage it soon. For faster resolution, please make sure you've provided:\n- A clear description\n- Steps to reproduce (for bugs)\n- Expected vs actual behavior\n- Environment details (OS, version, etc.)\n\nThanks for helping make Codeplane better!"
        continue-on-error: true
