name: load-test

description: |
  Load testing for the Codeplane server.
  Simulates concurrent users to check performance under load.

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      duration:
        description: "Test duration in seconds"
        required: false
        default: "60"
        type: string
      concurrency:
        description: "Number of concurrent users"
        required: false
        default: "10"
        type: string

permissions:
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Start server
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane serve --port 19876 --hostname 127.0.0.1 &
          sleep 5
          echo "::notice::Server started on port 19876"
      - name: Run load test
        run: |
          DURATION="${{ inputs.duration || '60' }}"
          CONCURRENCY="${{ inputs.concurrency || '10' }}"
          echo "::notice::Running load test: ${CONCURRENCY} concurrent users for ${DURATION}s"
          # Simple curl-based load test
          for i in $(seq 1 $CONCURRENCY); do
            (
              for j in $(seq 1 $((DURATION / 2))); do
                curl -s http://127.0.0.1:19876/global/version > /dev/null
                sleep 1
              done
            ) &
          done
          wait
          echo "::notice::Load test complete"
        continue-on-error: true
      - name: Check server health
        run: |
          curl -s http://127.0.0.1:19876/global/version
          echo "::notice::Server still responding after load test"
        continue-on-error: true
      - name: Generate report
        run: |
          echo "## Load Test Report" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: ${{ inputs.duration || '60' }}s" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrency: ${{ inputs.concurrency || '10' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Server: 127.0.0.1:19876" >> $GITHUB_STEP_SUMMARY
