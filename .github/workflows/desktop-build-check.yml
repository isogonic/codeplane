name: desktop-build-check

description: |
  Validates the desktop build pipeline.
  Checks that Electron builds work on all platforms.

on:
  push:
    branches: [main]
    paths:
      - "packages/desktop/**"
      - "packages/app/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/desktop/**"
      - "packages/app/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-desktop-config:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check electron-builder config
        run: |
          if [ -f packages/desktop/package.json ]; then
            echo "::notice::Desktop package.json found"
            node -e "
              const pkg = require('./packages/desktop/package.json');
              console.log('Electron version:', pkg.devDependencies?.electron || 'not found');
              console.log('electron-builder:', pkg.devDependencies?.['electron-builder'] || 'not found');
            "
          fi
        continue-on-error: true
      - name: Check main process
        run: |
          if [ -f packages/desktop/src/main/main.ts ]; then
            echo "::notice::Desktop main process found"
          else
            echo "::warning::Desktop main process not found"
          fi
        continue-on-error: true

  check-desktop-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check desktop build
        run: |
          cd packages/desktop
          if [ -f package.json ]; then
            bun install 2>/dev/null || true
            if bun run build 2>/dev/null; then
              echo "::notice::Desktop build successful"
            else
              echo "::warning::Desktop build failed"
            fi
          fi
        continue-on-error: true

  desktop-report:
    needs: [check-desktop-config, check-desktop-build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate desktop report
        run: |
          echo "## Desktop Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Config check: ${{ needs.check-desktop-config.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build check: ${{ needs.check-desktop-build.result }}" >> $GITHUB_STEP_SUMMARY
