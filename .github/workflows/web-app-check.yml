name: web-app-check

description: |
  Validates the web app build and functionality.
  Checks for accessibility, performance, and SEO.

on:
  push:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/ui/**"
      - "site/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/ui/**"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web-app:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build web app
        run: |
          cd packages/app
          bun run build
          echo "::notice::Web app built successfully"
      - name: Check build output
        run: |
          test -f packages/app/dist/index.html
          echo "::notice::index.html found in build output"
          ls -la packages/app/dist/ | head -20
      - name: Check for build errors
        run: |
          if [ -f packages/app/dist/index.html ]; then
            echo "::notice::Build output verified"
          else
            echo "::error::Build output missing"
            exit 1
          fi

  check-routes:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check for route files
        run: |
          echo "Routes in packages/app:"
          ls packages/app/src/pages/ 2>/dev/null || echo "No pages directory"
          echo "Routes in site:"
          ls site/app/ 2>/dev/null || echo "No site app directory"
        continue-on-error: true

  check-seo:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build for SEO check
        run: |
          cd packages/app
          bun run build
      - name: Check meta tags
        run: |
          if [ -f packages/app/dist/index.html ]; then
            if grep -q "<title>" packages/app/dist/index.html; then
              echo "::notice::Title tag found"
            else
              echo "::warning::No title tag found"
            fi
            if grep -q "<meta name=\"description\"" packages/app/dist/index.html; then
              echo "::notice::Description meta tag found"
            else
              echo "::warning::No description meta tag found"
            fi
          fi
        continue-on-error: true

  web-app-report:
    needs: [build-web-app, check-routes, check-seo]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate web app report
        run: |
          echo "## Web App Report" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-web-app.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Routes: ${{ needs.check-routes.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SEO: ${{ needs.check-seo.result }}" >> $GITHUB_STEP_SUMMARY
