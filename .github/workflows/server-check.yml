name: server-check

description: |
  Validates the server build and key functionality.
  Checks that the server starts and responds to requests.

on:
  push:
    branches: [main]
    paths:
      - "packages/codeplane/src/server/**"
      - "packages/codeplane/src/cli/**"
      - "packages/shared/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/codeplane/src/server/**"
      - "packages/codeplane/src/cli/**"
      - "packages/shared/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-server:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build server
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Test server binary
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane --version
          echo "::notice::Server binary built successfully"

  start-server:
    needs: build-server
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build server
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
      - name: Start server
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane serve --port 19876 --hostname 127.0.0.1 &
          sleep 5
          echo "::notice::Server started"
      - name: Test server endpoints
        run: |
          curl -s http://127.0.0.1:19876/global/version
          echo "::notice::Server responding"
      - name: Test CLI commands
        run: |
          ./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane config paths
          echo "::notice::CLI commands working"
      - name: Stop server
        run: |
          pkill -f codeplane || echo "Server already stopped"
        continue-on-error: true

  server-report:
    needs: [build-server, start-server]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate server report
        run: |
          echo "## Server Report" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build-server.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Start: ${{ needs.start-server.result }}" >> $GITHUB_STEP_SUMMARY
