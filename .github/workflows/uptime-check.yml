name: uptime-check

description: |
  Checks the uptime of external services and the website.
  Reports any downtime or issues.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-services:
    runs-on: ubuntu-24.04
    steps:
      - name: Check website
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://codeplane.cc)
          echo "codeplane.cc: HTTP ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Website returned ${STATUS}"
          fi
        continue-on-error: true
      - name: Check docs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://codeplane.cc/docs/)
          echo "codeplane.cc/docs: HTTP ${STATUS}"
        continue-on-error: true
      - name: Check npm registry
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://registry.npmjs.org/codeplane-ai/latest)
          echo "npm registry: HTTP ${STATUS}"
        continue-on-error: true
      - name: Check GitHub API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/repos/isogonic/codeplane)
          echo "GitHub API: HTTP ${STATUS}"
        continue-on-error: true

  report:
    needs: check-services
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Uptime report
        run: |
          echo "## Uptime Report" >> $GITHUB_STEP_SUMMARY
          echo "Services checked: codeplane.cc, docs, npm registry, GitHub API" >> $GITHUB_STEP_SUMMARY
          echo "Check logs for individual service status" >> $GITHUB_STEP_SUMMARY
