name: compatibility-report

description: |
  Generates a comprehensive compatibility report.
  Checks OS, Node, Bun, and browser compatibility.

on:
  schedule:
    - cron: "0 5 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  os-compatibility:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-13
          - macos-14
          - macos-15
          - windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check OS
        run: |
          echo "OS: $(uname -a)"
          echo "::notice::OS compatibility check for ${{ matrix.os }}"

  browser-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check browser targets
        run: |
          if [ -f packages/app/package.json ]; then
            node -e "
              const pkg = require('./packages/app/package.json');
              console.log('Browserslist:', pkg.browserslist || 'not configured');
            "
          fi
        continue-on-error: true
      - name: Check for browser-specific issues
        run: |
          echo "::notice::Checking for browser compatibility issues..."
        continue-on-error: true

  runtime-compatibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check Bun version
        run: |
          bun --version
          echo "::notice::Bun version checked"
      - name: Check Node version
        run: |
          node --version
          echo "::notice::Node version checked"
      - name: Check package.json engines
        run: |
          node -e "
            const pkg = require('./package.json');
            console.log('Engines:', JSON.stringify(pkg.engines, null, 2));
          "
        continue-on-error: true

  report:
    needs: [os-compatibility, browser-compatibility, runtime-compatibility]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate compatibility report
        run: |
          echo "## Compatibility Report" >> $GITHUB_STEP_SUMMARY
          echo "- OS compatibility: ${{ needs.os-compatibility.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Browser compatibility: ${{ needs.browser-compatibility.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Runtime compatibility: ${{ needs.runtime-compatibility.result }}" >> $GITHUB_STEP_SUMMARY
