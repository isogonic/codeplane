name: license-check

description: |
  Checks that all files have proper license headers,
  and that all dependencies have compatible licenses.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-headers:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check for license headers
        run: |
          # Check that source files have license headers
          MISSING=0
          for file in $(find packages -name "*.ts" -not -name "*.d.ts" -not -path "*/node_modules/*" | head -50); do
            if ! head -5 "$file" | grep -q "MIT\|license\|copyright"; then
              MISSING=$((MISSING + 1))
            fi
          done
          echo "Files without license headers: ${MISSING}"
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::${MISSING} files may be missing license headers"
          fi
        continue-on-error: true

  check-dependencies:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check dependency licenses
        run: |
          # Check licenses of dependencies
          for pkg in packages/*/package.json; do
            node -e "
              const pkg = require('./$pkg');
              const deps = {...pkg.dependencies, ...pkg.devDependencies};
              console.log('Package: $(dirname $pkg)');
              console.log('  Total deps:', Object.keys(deps).length);
            "
          done
        continue-on-error: true

  check-license-file:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check LICENSE file
        run: |
          if [ -f LICENSE ]; then
            echo "::notice::LICENSE file found"
            head -5 LICENSE
          else
            echo "::error::LICENSE file not found"
            exit 1
          fi
      - name: Check LICENSE in packages
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/LICENSE" ] || [ -f "$pkg/LICENSE.md" ]; then
              echo "✓ $(basename $pkg) has LICENSE"
            else
              echo "✗ $(basename $pkg) missing LICENSE"
            fi
          done
        continue-on-error: true
