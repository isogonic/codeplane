name: branch-protection

description: |
  Verifies branch protection rules are in place.
  Runs on schedule and manual dispatch.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-protection:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check branch protection
        run: |
          echo "Checking branch protection rules for main"
          echo "::notice::Branch protection should require PR reviews"
      - name: Verify required checks
        run: |
          echo "Verifying required status checks"
          BRANCH="main"
          echo "Branch: $BRANCH"
      - name: Report status
        run: |
          echo "Branch protection audit complete"
