name: release-notes

description: |
  Auto-generates release notes from conventional commits.
  Also validates that release notes are present before publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate notes for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-notes:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get commits since last tag
        run: |
          set -euo pipefail
          CURRENT_TAG="${{ github.ref_name || inputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Previous tag: ${PREVIOUS_TAG}"
            echo "Current tag: ${CURRENT_TAG}"

            echo "## Features" > release-notes.md
            echo "" >> release-notes.md
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --oneline --grep="^feat" >> release-notes.md || echo "No features"
            echo "" >> release-notes.md

            echo "## Fixes" >> release-notes.md
            echo "" >> release-notes.md
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --oneline --grep="^fix" >> release-notes.md || echo "No fixes"
            echo "" >> release-notes.md

            echo "## Documentation" >> release-notes.md
            echo "" >> release-notes.md
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --oneline --grep="^docs" >> release-notes.md || echo "No docs changes"
            echo "" >> release-notes.md

            echo "## Other Changes" >> release-notes.md
            echo "" >> release-notes.md
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --oneline --grep="^chore\|^refactor\|^perf\|^ci\|^build" >> release-notes.md || echo "No other changes"
          else
            echo "## Release Notes" > release-notes.md
            echo "" >> release-notes.md
            git log --oneline -20 >> release-notes.md
          fi

          cat release-notes.md
      - name: Upload notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ github.ref_name || inputs.version }}
          path: release-notes.md
          retention-days: 7

  validate-notes:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check release notes
        run: |
          if [ -f release-notes.md ]; then
            if ! grep -q "[^[:space:]]" release-notes.md; then
              echo "::error::Release notes are empty"
              exit 1
            fi
            echo "::notice::Release notes validated"
          fi
        continue-on-error: true
