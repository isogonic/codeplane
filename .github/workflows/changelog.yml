name: changelog

description: |
  Auto-generates and validates the changelog.
  Checks that CHANGELOG.md is updated on release PRs.
  Also generates release notes from conventional commits.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate changelog for"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-changelog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md exists
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "::notice::CHANGELOG.md exists"
            head -50 CHANGELOG.md
          else
            echo "::warning::CHANGELOG.md not found — creating one"
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
          fi
      - name: Check for unreleased changes
        run: |
          if [ -f CHANGELOG.md ] && grep -q "## Unreleased" CHANGELOG.md; then
            echo "::notice::Unreleased section found"
          else
            echo "::warning::No Unreleased section found in CHANGELOG.md"
          fi
      - name: Check for version entries
        run: |
          if [ -f CHANGELOG.md ]; then
            grep -c "## \[" CHANGELOG.md || echo "0 version entries found"
          fi

  generate-release-notes:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate notes from commits
        run: |
          set -euo pipefail
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "## Changes since ${LAST_TAG}" > release-notes.md
            echo "" >> release-notes.md
            git log "${LAST_TAG}..HEAD" --oneline >> release-notes.md
            echo "::notice::Release notes generated"
            cat release-notes.md
          else
            echo "::warning::No previous tag found"
          fi
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 3
        continue-on-error: true

  check-conventional-commits:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit format
        run: |
          # Check last 10 commits
          git log --oneline -10 | while read line; do
            msg=$(echo "$line" | sed 's/^[a-f0-9]* //')
            if echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\([^)]+\))?:'; then
              echo "✓ $msg"
            else
              echo "✗ $msg (does not follow conventional commit format)"
            fi
          done
        continue-on-error: true
