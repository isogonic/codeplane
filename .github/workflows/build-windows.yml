name: build-windows

description: |
  Windows-specific builds for x64 and arm64.
  Validates the .exe, NSIS installer, and zip distribution.

on:
  push:
    branches: [main, "release/*"]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "packages/codeplane/**"
      - "packages/desktop/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build CLI for Windows x64
        shell: bash
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "${{ github.ref_name }}"
      - name: Test binary
        shell: bash
        run: |
          ./packages/codeplane/dist/codeplane-windows-x64/bin/codeplane.exe --version || echo "Binary version check"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: packages/codeplane/dist/codeplane-windows-x64/
          retention-days: 7

  build-windows-arm64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build CLI for Windows arm64
        shell: bash
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "${{ github.ref_name }}"
      - name: Test binary
        shell: bash
        run: |
          ./packages/codeplane/dist/codeplane-windows-arm64/bin/codeplane.exe --version || echo "Binary version check"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-build
          path: packages/codeplane/dist/codeplane-windows-arm64/
          retention-days: 7

  build-desktop-windows:
    needs: [build-windows-x64, build-windows-arm64]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build desktop for Windows
        shell: bash
        run: |
          cd packages/desktop
          bun install 2>/dev/null || true
          if command -v electron-builder &> /dev/null; then
            electron-builder --win --x64
          else
            echo "::warning::electron-builder not available"
          fi
        continue-on-error: true
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-build
          path: packages/desktop/dist/
          retention-days: 7
        continue-on-error: true

  code-sign-check:
    needs: build-desktop-windows
    runs-on: windows-2025
    steps:
      - name: Check code signing
        shell: bash
        run: |
          if [ -n "${WINDOWS_CERTIFICATE:-}" ]; then
            echo "::notice::Windows certificate available for code signing"
          else
            echo "::warning::Windows certificate not available — code signing will be skipped"
          fi
        continue-on-error: true
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
