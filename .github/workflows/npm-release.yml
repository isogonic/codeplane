name: npm-release

on:
  push:
    tags:
      # Fire only for the canonical CLI release tag (vX.Y.Z). Exclude the
      # paired desktop/mobile tags (vX.Y.Z-desktop / vX.Y.Z-mobile) which also
      # match "v*" but must NOT re-trigger an npm publish of an already-published
      # immutable version. The `release: published` trigger is intentionally
      # omitted: `gh release create` pushes the tag AND publishes the release,
      # which would double-fire this workflow and fail on npm's immutable version.
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to publish"
        required: true
        type: string

permissions: write-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_REPO: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.resolve.outputs.enabled }}
      source_tag: ${{ steps.resolve.outputs.source_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [ -z "$tag" ]; then
            echo "A release tag is required." >&2
            exit 1
          fi
          if [[ "$tag" != v* ]]; then
            echo "Release tags must start with v." >&2
            exit 1
          fi
          if [[ "$tag" == *-desktop || "$tag" == *-mobile ]]; then
            # Platform-specific re-tags (`-desktop`, `-mobile`) only exist
            # to drive the matching platform-release workflow; they MUST
            # NOT republish to npm — the source `v<x.y.z>` tag already did.
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve.outputs.source_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@^11.10.0

      - uses: ./.github/actions/setup-bun

      - name: Configure npm token fallback
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required for npm package publishing." >&2
            exit 1
          fi
          printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"

      - name: Verify package versions
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          for file in packages/codeplane/package.json packages/sdk/js/package.json packages/plugin/package.json; do
            pkg_version="$(node -e "console.log(require('./${file}').version)")"
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "$file version $pkg_version does not match $VERSION" >&2
              exit 1
            fi
          done

      - name: Validate source GitHub release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.source_tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "${{ github.repository }}" --json body > base-release.json
          body="$(jq -r '.body // ""' base-release.json)"
          if ! printf '%s\n' "$body" | grep -q '[^[:space:]]'; then
            echo "Release $TAG is missing notes. Create the GitHub release first with a precise changelog." >&2
            exit 1
          fi
          if printf '%s\n' "$body" | grep -Eiq '^[[:space:]]*No notable changes\.?[[:space:]]*$|^BLOCKED:'; then
            echo "Release $TAG uses placeholder changelog text. Replace it with precise shipped changes before publishing." >&2
            exit 1
          fi
          if printf '%s\n' "$body" | grep -Eiq 'rolls forward in-flight|bumps version metadata|<area>|^## CLI · npm release$|^## Desktop Shell$|^## Mobile Shell$'; then
            echo "Release $TAG still contains generic boilerplate. Replace it with a precise changelog before publishing." >&2
            exit 1
          fi

      - name: Publish npm packages
        run: bun ./script/publish.ts
        env:
          CODEPLANE_VERSION: ${{ needs.resolve.outputs.version }}
          CODEPLANE_PUBLISH_NPM_ONLY: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew formula
        shell: bash
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail

          # Configure git for commits
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the tap repo (non-fatal if it doesn't exist yet)
          TAP_DIR=$(mktemp -d)
          if ! git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/isogonic/homebrew-tap.git" "$TAP_DIR" 2>/dev/null; then
            echo "Homebrew tap repo is not available; skipping Homebrew formula update."
            exit 0
          fi
          cd "$TAP_DIR"

          # Download each platform package and compute SHA256
          PLATFORMS=(
            "codeplane-darwin-arm64"
            "codeplane-darwin-x64"
            "codeplane-linux-arm64"
            "codeplane-linux-x64"
          )

          declare -A SHAS
          for platform in "${PLATFORMS[@]}"; do
            url="https://registry.npmjs.org/${platform}/-/${platform}-${VERSION}.tgz"
            curl -fsSL -o "/tmp/${platform}.tgz" "$url"
            SHAS[$platform]=$(sha256sum "/tmp/${platform}.tgz" | awk '{print $1}')
            # Guard against an empty/missing tarball (sha of zero bytes).
            if [ -z "${SHAS[$platform]}" ] || [ "${SHAS[$platform]}" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              echo "Tarball for ${platform}@${VERSION} is empty or missing; aborting Homebrew update." >&2
              exit 1
            fi
          done

          # Regenerate the whole formula from scratch with REAL per-platform
          # sha256 values. The previous sed-based approach was buggy: the URL
          # lines use the `#{version}` interpolation (so a literal-version sed
          # matched nothing) and a single `sha256` sed rewrote EVERY block to
          # the same (last) platform's hash. Writing the file wholesale is
          # deterministic and keeps every platform's hash correct.
          mkdir -p Formula
          FORMULA="Formula/codeplane.rb"
          cat > "$FORMULA" <<RUBY
          # typed: false
          # frozen_string_literal: true

          # Codeplane — the AI coding agent built for the terminal.
          # Auto-updated by the npm-release workflow on each release.
          class Codeplane < Formula
            desc "The AI coding agent built for the terminal"
            homepage "${repoURL:-https://github.com/isogonic/codeplane}"
            version "${VERSION}"
            depends_on "ripgrep"

            on_macos do
              if Hardware::CPU.arm?
                url "https://registry.npmjs.org/codeplane-darwin-arm64/-/codeplane-darwin-arm64-#{version}.tgz"
                sha256 "${SHAS[codeplane-darwin-arm64]}"

                def install
                  bin.install "package/bin/codeplane"
                end
              end
              if Hardware::CPU.intel?
                url "https://registry.npmjs.org/codeplane-darwin-x64/-/codeplane-darwin-x64-#{version}.tgz"
                sha256 "${SHAS[codeplane-darwin-x64]}"

                def install
                  bin.install "package/bin/codeplane"
                end
              end
            end

            on_linux do
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://registry.npmjs.org/codeplane-linux-arm64/-/codeplane-linux-arm64-#{version}.tgz"
                sha256 "${SHAS[codeplane-linux-arm64]}"

                def install
                  bin.install "package/bin/codeplane"
                end
              end
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://registry.npmjs.org/codeplane-linux-x64/-/codeplane-linux-x64-#{version}.tgz"
                sha256 "${SHAS[codeplane-linux-x64]}"

                def install
                  bin.install "package/bin/codeplane"
                end
              end
            end

            test do
              system "#{bin}/codeplane", "--version"
            end
          end
          RUBY

          # The heredoc above is indented for YAML readability; strip the
          # leading 10 spaces so the committed Ruby file is clean.
          sed -i 's/^          //' "$FORMULA"

          # Remove any stale root-level formula left by the legacy publish path.
          [ -f codeplane.rb ] && git rm -f codeplane.rb || true

          # Commit and push
          git add "$FORMULA"
          if git diff --cached --quiet; then
            echo "No formula changes needed"
            exit 0
          fi
          git commit -m "codeplane ${VERSION}"
          for attempt in 1 2 3; do
            if git push origin main; then
              break
            fi
            sleep $((attempt * 5))
            git pull --rebase origin main
          done

      - name: Sync GitHub release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.source_tag }}
        run: |
          set -euo pipefail
          gh_release() {
            local attempt
            for attempt in 1 2 3; do
              if gh release "$@"; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            return 1
          }

          title="$TAG"
          notes_file="$(mktemp)"
          gh release view "$TAG" --repo "${{ github.repository }}" --json name,body > base-release.json
          source_title="$(jq -r '.name // empty' base-release.json)"
          if [ -n "$source_title" ]; then
            title="$source_title"
          fi
          jq -r '.body // ""' base-release.json > "$notes_file"
          gh_release edit "$TAG" \
            --title "$title" \
            --notes-file "$notes_file" \
            --repo "${{ github.repository }}"
