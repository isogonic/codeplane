name: npm-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_REPO: ${{ github.repository }}
  NPM_CONFIG_PROVENANCE: "true"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.resolve.outputs.enabled }}
      source_tag: ${{ steps.resolve.outputs.source_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [ -z "$tag" ]; then
            echo "A release tag is required." >&2
            exit 1
          fi
          if [[ "$tag" != v* ]]; then
            echo "Release tags must start with v." >&2
            exit 1
          fi
          if [[ "$tag" == *-desktop || "$tag" == *-mobile ]]; then
            # Platform-specific re-tags (`-desktop`, `-mobile`) only exist
            # to drive the matching platform-release workflow; they MUST
            # NOT republish to npm — the source `v<x.y.z>` tag already did.
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.resolve.outputs.source_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.10.0

      - uses: ./.github/actions/setup-bun

      - name: Configure npm token fallback
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            exit 0
          fi
          printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"

      - name: Verify package versions
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          for file in packages/codeplane/package.json packages/sdk/js/package.json packages/plugin/package.json; do
            pkg_version="$(node -e "console.log(require('./${file}').version)")"
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "$file version $pkg_version does not match $VERSION" >&2
              exit 1
            fi
          done

      - name: Publish npm packages
        run: bun ./script/publish.ts
        env:
          CODEPLANE_VERSION: ${{ needs.resolve.outputs.version }}
          CODEPLANE_PUBLISH_NPM_ONLY: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release (CLI / general)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.source_tag }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          # The bare v<x.y.z> tag is the "general" release record for a
          # Codeplane version. The desktop / mobile workflows already
          # create their own per-platform records and the changelog
          # page (codeplane.cc/docs/changelog/) groups by base version —
          # but without this step the parent row has no body, only the
          # collapsible platform sub-rows. This step creates / updates
          # the parent release record with auto-generated notes plus a
          # banner describing what the CLI is (vs the platform builds).

          notes_file="$(mktemp)"
          {
            echo "## CLI · npm release"
            echo ""
            echo "> **Codeplane $VERSION on npm.** The CLI is published as **\`codeplane-ai\`** (the wrapper) plus platform-specific binary packages (\`codeplane-darwin-arm64\`, \`codeplane-linux-x64\`, etc.) installed via \`optionalDependencies\`. The same binary is also fetched by the [\`/install\`](https://codeplane.cc/install) bash one-liner."
            echo ">"
            echo "> Install one of:"
            echo "> - \`curl -fsSL https://codeplane.cc/install | bash\` — pulls the matching binary straight from npm"
            echo "> - \`npm install -g codeplane-ai\` — npm / pnpm / bun all work"
            echo ">"
            echo "> The desktop app (.dmg / .exe / .AppImage) lives at [\`v${VERSION}-desktop\`](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}-desktop). The iOS shell lives at [\`v${VERSION}-mobile\`](https://github.com/${{ github.repository }}/releases/tag/v${VERSION}-mobile)."
            echo ""
            echo "---"
            echo ""
          } > "$notes_file"

          # Append auto-generated changelog (commits since previous tag).
          # `gh api` is more reliable than `gh release generate-notes` for
          # tags that don't yet have a release record.
          git fetch --force --tags origin 'refs/tags/v*:refs/tags/v*'
          previous_tag=""
          while IFS= read -r candidate; do
            if [[ "$candidate" == *-desktop || "$candidate" == *-mobile || "$candidate" == "$TAG" ]]; then
              continue
            fi
            previous_tag="$candidate"
            break
          done < <(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname)
          if [ -n "$previous_tag" ]; then
            gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$TAG" \
              -f previous_tag_name="$previous_tag" \
              --jq '.body' >> "$notes_file" || true
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file "$notes_file" \
              --repo "${{ github.repository }}"
          else
            gh release create "$TAG" \
              --target "$(git rev-parse HEAD)" \
              --title "$TAG" \
              --notes-file "$notes_file" \
              --repo "${{ github.repository }}"
          fi
