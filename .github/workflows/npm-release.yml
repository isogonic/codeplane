name: npm-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to publish"
        required: true
        type: string

permissions: write-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_REPO: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.resolve.outputs.enabled }}
      source_tag: ${{ steps.resolve.outputs.source_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          if [ -z "$tag" ]; then
            echo "A release tag is required." >&2
            exit 1
          fi
          if [[ "$tag" != v* ]]; then
            echo "Release tags must start with v." >&2
            exit 1
          fi
          if [[ "$tag" == *-desktop || "$tag" == *-mobile ]]; then
            # Platform-specific re-tags (`-desktop`, `-mobile`) only exist
            # to drive the matching platform-release workflow; they MUST
            # NOT republish to npm — the source `v<x.y.z>` tag already did.
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "source_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve.outputs.source_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@^11.10.0

      - uses: ./.github/actions/setup-bun

      - name: Configure npm token fallback
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required for npm package publishing." >&2
            exit 1
          fi
          printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"

      - name: Verify package versions
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          for file in packages/codeplane/package.json packages/sdk/js/package.json packages/plugin/package.json; do
            pkg_version="$(node -e "console.log(require('./${file}').version)")"
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "$file version $pkg_version does not match $VERSION" >&2
              exit 1
            fi
          done

      - name: Validate source GitHub release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.source_tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "${{ github.repository }}" --json body > base-release.json
          body="$(jq -r '.body // ""' base-release.json)"
          if ! printf '%s\n' "$body" | grep -q '[^[:space:]]'; then
            echo "Release $TAG is missing notes. Create the GitHub release first with a precise changelog." >&2
            exit 1
          fi
          if printf '%s\n' "$body" | grep -Eiq '^[[:space:]]*No notable changes\.?[[:space:]]*$|^BLOCKED:'; then
            echo "Release $TAG uses placeholder changelog text. Replace it with precise shipped changes before publishing." >&2
            exit 1
          fi
          if printf '%s\n' "$body" | grep -Eiq 'rolls forward in-flight|bumps version metadata|<area>|^## CLI · npm release$|^## Desktop Shell$|^## Mobile Shell$'; then
            echo "Release $TAG still contains generic boilerplate. Replace it with a precise changelog before publishing." >&2
            exit 1
          fi

      - name: Publish npm packages
        run: bun ./script/publish.ts
        env:
          CODEPLANE_VERSION: ${{ needs.resolve.outputs.version }}
          CODEPLANE_PUBLISH_NPM_ONLY: "1"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew formula
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail

          # Configure git for commits
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Clone the tap repo
          TAP_DIR=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/isogonic/homebrew-tap.git" "$TAP_DIR"
          cd "$TAP_DIR"

          # Download each platform package and compute SHA256
          PLATFORMS=(
            "codeplane-darwin-arm64"
            "codeplane-darwin-x64"
            "codeplane-linux-arm64"
            "codeplane-linux-x64"
          )

          declare -A SHAS
          for platform in "${PLATFORMS[@]}"; do
            url="https://registry.npmjs.org/${platform}/-/${platform}-${VERSION}.tgz"
            curl -fsSL -o "/tmp/${platform}.tgz" "$url"
            SHAS[$platform]=$(sha256sum "/tmp/${platform}.tgz" | awk '{print $1}')
          done

          # Update the formula
          FORMULA="Formula/codeplane.rb"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          for platform in "${PLATFORMS[@]}"; do
            sed -i "s|${platform}-[0-9.]*\.tgz|${platform}-${VERSION}.tgz|" "$FORMULA"
            sed -i "s|sha256 \"[^\"]*\"|sha256 \"${SHAS[$platform]}\"|" "$FORMULA"
          done

          # Commit and push
          git add "$FORMULA"
          if git diff --cached --quiet; then
            echo "No formula changes needed"
            exit 0
          fi
          git commit -m "codeplane ${VERSION}"
          for attempt in 1 2 3; do
            if git push origin main; then
              break
            fi
            sleep $((attempt * 5))
            git pull --rebase origin main
          done

      - name: Sync GitHub release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.source_tag }}
        run: |
          set -euo pipefail
          gh_release() {
            local attempt
            for attempt in 1 2 3; do
              if gh release "$@"; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            return 1
          }

          title="$TAG"
          notes_file="$(mktemp)"
          gh release view "$TAG" --repo "${{ github.repository }}" --json name,body > base-release.json
          source_title="$(jq -r '.name // empty' base-release.json)"
          if [ -n "$source_title" ]; then
            title="$source_title"
          fi
          jq -r '.body // ""' base-release.json > "$notes_file"
          gh_release edit "$TAG" \
            --title "$title" \
            --notes-file "$notes_file" \
            --repo "${{ github.repository }}"
