name: third-party-audit

description: |
  Audits third-party dependencies and their licenses.
  Checks for known vulnerabilities and compliance issues.

on:
  schedule:
    - cron: "0 4 * * 1"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "bun.lock"
      - "packages/*/package.json"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  audit-dependencies:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Audit with npm
        run: |
          npm audit --audit-level=moderate || true
          echo "::notice::npm audit complete"
      - name: Check for deprecated packages
        run: |
          # List all dependencies and check for deprecated ones
          for pkg in packages/*/package.json; do
            node -e "
              const pkg = require('./$pkg');
              const deps = {...pkg.dependencies, ...pkg.devDependencies};
              console.log('$(dirname $pkg):', Object.keys(deps).length, 'deps');
            "
          done
        continue-on-error: true
      - name: Check license compatibility
        run: |
          echo "::notice::Checking license compatibility..."
          # In a real setup, use license-checker or similar
          for pkg in packages/*/package.json; do
            node -e "
              const pkg = require('./$pkg');
              console.log('$(dirname $pkg) license:', pkg.license || 'none');
            "
          done
        continue-on-error: true

  check-upstream:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check upstream sync
        run: |
          # Check if upstream has new commits
          git remote add upstream https://github.com/sst/opencode.git 2>/dev/null || true
          git fetch upstream --depth 1 2>/dev/null || true
          UPSTREAM_SHA=$(git rev-parse upstream/main 2>/dev/null || echo "")
          if [ -n "$UPSTREAM_SHA" ]; then
            BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo "0")
            echo "::notice::Upstream is ${BEHIND} commits ahead"
            if [ "$BEHIND" -gt 50 ]; then
              echo "::warning::Upstream is ${BEHIND} commits ahead — consider syncing"
            fi
          fi
        continue-on-error: true
