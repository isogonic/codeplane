name: beta-release

description: |
  Beta and release candidate (RC) pipeline.
  Triggers on tags matching `v*-beta.*`, `v*-rc.*`, `v*-alpha.*`.
  Publishes to npm with the `beta` tag and creates a pre-release GitHub entry.

on:
  push:
    tags:
      - "v*-beta.*"
      - "v*-rc.*"
      - "v*-alpha.*"
      - "v*-preview.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Beta version (e.g., 31.1.0-beta.1)"
        required: true
        type: string
      tag:
        description: "npm dist-tag"
        required: false
        default: "beta"
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: beta-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GH_REPO: ${{ github.repository }}

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Validate version format
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(beta|rc|alpha|preview)\.[0-9]+$ ]]; then
            echo "::error::Invalid beta version format: $VERSION"
            echo "Expected: vX.Y.Z-beta.N, vX.Y.Z-rc.N, vX.Y.Z-alpha.N, vX.Y.Z-preview.N"
            exit 1
          fi
          echo "::notice::Version format valid: $VERSION"
      - name: Run lint
        run: bun lint
      - name: Run typecheck
        run: bunx turbo typecheck
      - name: Run tests
        run: |
          bun --cwd packages/codeplane test || echo "Tests may fail — not blocking beta"
        continue-on-error: true

  build-matrix:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
            arch: arm64
          - os: macos-13
            platform: darwin-x64
            arch: x64
          - os: self-hosted
            platform: linux-x64
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            arch: arm64
          - os: windows-2025
            platform: windows-x64
            arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build ${{ matrix.platform }}
        run: |
          cd packages/codeplane
          bun script/build.ts --skip-embed-web-ui --skip-install --single
        env:
          CODEPLANE_VERSION: "${{ github.ref_name || inputs.version }}"
          GH_REPO: ${{ github.repository }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.platform }}-${{ github.ref_name || inputs.version }}
          path: packages/codeplane/dist/codeplane-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 14

  publish-npm:
    needs: build-matrix
    runs-on: self-hosted
    environment: beta
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Configure npm
        run: printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: beta-*-${{ github.ref_name || inputs.version }}
          merge-multiple: true
      - name: Publish beta packages
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name || inputs.version }}"
          TAG="${{ inputs.tag || 'beta' }}"
          for dir in packages/codeplane/dist/codeplane-*; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('${dir}/package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('${dir}/package.json', JSON.stringify(p,null,2)+'\n');"
              cd "$dir"
              npm publish --tag "${TAG}" --access public
              cd - >/dev/null
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-beta-release:
    needs: publish-npm
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create beta release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name || inputs.version }}"
          gh release create "${TAG}" \
            --target "${{ github.sha }}" \
            --title "${TAG}" \
            --notes "Beta release ${TAG}.\n\nInstall with: \`npm install -g codeplane-ai@${TAG}\`" \
            --prerelease

  update-homebrew-beta:
    needs: publish-npm
    runs-on: self-hosted
    steps:
      - name: Update beta formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          TAP_DIR=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/isogonic/homebrew-tap.git" "$TAP_DIR"
          cd "$TAP_DIR"
          # Create beta formula
          cp Formula/codeplane.rb Formula/codeplane-beta.rb
          sed -i "s/class Codeplane /class CodeplaneBeta /" Formula/codeplane-beta.rb
          sed -i "s/desc \".*\"/desc \"Codeplane beta preview\"/" Formula/codeplane-beta.rb
          git add Formula/codeplane-beta.rb
          git diff --cached --quiet || (git commit -m "beta: ${{ github.ref_name || inputs.version }}" && git push origin main)
