name: docs-preview

description: |
  Deploys preview builds of the documentation for every PR.
  Also validates that all docs build correctly before merge.

on:
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.event.pull_request.number }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  build-docs-preview:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build site
        run: |
          cd site
          bun install
          bun run build
      - name: Upload preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-${{ github.event.pull_request.number }}
          path: site/out/
          retention-days: 3
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::notice::Docs preview built for PR #${{ github.event.pull_request.number }}"
        continue-on-error: true

  validate-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check for broken links
        run: |
          cd site
          bun install
          bun run build
          # Check for broken internal links
          if grep -r "href=\"\#\"" out/; then
            echo "::warning::Found empty href links in docs"
          fi
          # Check for external links
          if grep -r "https://github.com/devinoldenburg" out/; then
            echo "::error::Found old GitHub references in docs"
            exit 1
          fi
        continue-on-error: true
      - name: Check for stale content
        run: |
          # Check for references to old versions
          if grep -r "v28\." site/ docs/ 2>/dev/null; then
            echo "::warning::Found references to old v28.x versions"
          fi
        continue-on-error: true
      - name: Check for missing translations
        run: |
          # Check that all i18n files have the same keys
          cd packages/app/src/i18n
          ls -la *.ts | head -20
          echo "::notice::Translation files checked"
        continue-on-error: true
