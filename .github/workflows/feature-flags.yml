name: feature-flags

description: |
  Manages feature flags for gradual rollouts.
  Enables/disables features based on environment and percentage.

on:
  workflow_dispatch:
    inputs:
      feature:
        description: "Feature name"
        required: true
        type: string
      action:
        description: "Action"
        required: true
        type: choice
        options:
          - enable
          - disable
          - status
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      percentage:
        description: "Rollout percentage (0-100)"
        required: false
        default: "100"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  manage-feature:
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Update feature flag
        run: |
          FEATURE="${{ inputs.feature }}"
          ACTION="${{ inputs.action }}"
          ENV="${{ inputs.environment }}"
          PERCENTAGE="${{ inputs.percentage }}"

          echo "::notice::Feature: ${FEATURE}"
          echo "::notice::Action: ${ACTION}"
          echo "::notice::Environment: ${ENV}"
          echo "::notice::Percentage: ${PERCENTAGE}"

          # In a real setup, this would update a feature flag store
          # (e.g., LaunchDarkly, Split, Unleash, or a config file)
          echo "Feature flag update simulated"
        continue-on-error: true

  validate-feature:
    needs: manage-feature
    runs-on: ubuntu-24.04
    steps:
      - name: Validate feature flag
        run: |
          echo "::notice::Validating feature flag ${{ inputs.feature }}"
          # Check that the feature flag is properly set
        continue-on-error: true
