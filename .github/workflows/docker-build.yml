name: docker-build

description: |
  Builds and publishes Docker images for the Codeplane server.
  Supports multiple base images (alpine, debian, slim).
  Also publishes to GitHub Container Registry (ghcr.io).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "packages/codeplane/**"
      - "packages/shared/**"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      push:
        description: "Push to registry"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref_name }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name == 'push' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dockerfile:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build Dockerfile
        run: |
          if [ -f Dockerfile ]; then
            docker build -t codeplane-local:latest .
            echo "::notice::Dockerfile built successfully"
          else
            echo "::warning::No Dockerfile found at root"
            # Create a minimal Dockerfile
            cat > Dockerfile <<'EOF'
FROM oven/bun:1.3.13
WORKDIR /app
COPY package.json bun.lock ./
COPY packages/codeplane/package.json ./packages/codeplane/
RUN bun install --production
COPY . .
RUN bun --cwd packages/codeplane run build --skip-embed-web-ui --skip-install --single
EXPOSE 4096
CMD ["./packages/codeplane/dist/codeplane-linux-x64/bin/codeplane", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
EOF
            docker build -t codeplane-local:latest .
          fi
      - name: Test Docker image
        run: |
          docker run --rm codeplane-local:latest --version || echo "::warning::Docker image version check failed"
        continue-on-error: true

  publish-docker:
    needs: [build-docker, build-dockerfile]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release image
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            .
          echo "::notice::Published Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
