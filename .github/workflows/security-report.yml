name: security-report

description: |
  Generates comprehensive security reports.
  Aggregates results from all security checks.

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  generate-security-report:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate > security-report.txt 2>&1 || true
          echo "::notice::npm audit complete"
      - name: Check for vulnerabilities
        run: |
          if grep -q "vulnerabilities" security-report.txt; then
            echo "::warning::Vulnerabilities found"
            cat security-report.txt
          else
            echo "::notice::No vulnerabilities found"
          fi
        continue-on-error: true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt
          retention-days: 30
        continue-on-error: true

  security-summary:
    needs: generate-security-report
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate security summary
        run: |
          echo "## Security Report" >> $GITHUB_STEP_SUMMARY
          echo "- Security audit: ${{ needs.generate-security-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Check artifacts for detailed security report" >> $GITHUB_STEP_SUMMARY
