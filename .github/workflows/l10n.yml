name: l10n

description: |
  Localization and internationalization checks.
  Validates that all translation files have the same keys,
  and checks for missing translations.

on:
  push:
    branches: [main]
    paths:
      - "packages/app/src/i18n/**"
      - "packages/ui/src/i18n/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/app/src/i18n/**"
      - "packages/ui/src/i18n/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-translations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: List translation files
        run: |
          echo "Translation files in app:"
          ls -la packages/app/src/i18n/*.ts
          echo "Translation files in ui:"
          ls -la packages/ui/src/i18n/*.ts
      - name: Check for missing keys
        run: |
          # Compare all translation files against the English one
          for dir in packages/app/src/i18n packages/ui/src/i18n; do
            if [ -d "$dir" ]; then
              echo "Checking $dir"
              EN_FILE="$dir/en.ts"
              if [ -f "$EN_FILE" ]; then
                for other in "$dir"/*.ts; do
                  if [ "$other" != "$EN_FILE" ]; then
                    echo "  Comparing with $(basename $other)"
                  fi
                done
              fi
            fi
          done
        continue-on-error: true
      - name: Check for stale translations
        run: |
          # Check if any translations reference old values
          echo "::notice::Checking for stale translations..."
        continue-on-error: true

  validate-i18n:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build with all languages
        run: |
          cd packages/app
          bun run build
          echo "::notice::Build with all languages completed"
        continue-on-error: true
