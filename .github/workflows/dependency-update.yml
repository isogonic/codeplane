name: dependency-update

description: |
  Automatically checks for dependency updates and creates PRs.
  Runs weekly on Monday mornings.
  Supports Bun, npm, and GitHub Actions updates.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      update_type:
        description: "Update type"
        required: false
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-24.04
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check for outdated dependencies
        id: check
        run: |
          set -euo pipefail
          if bun outdated 2>/dev/null | grep -q "outdated"; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Outdated dependencies found"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "::notice::All dependencies up to date"
          fi
        continue-on-error: true

  update-dependencies:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Update dependencies
        run: |
          UPDATE_TYPE="${{ inputs.update_type || 'minor' }}"
          echo "Updating dependencies (${UPDATE_TYPE})..."
          bun update 2>/dev/null || echo "bun update may not be available"
      - name: Run tests after update
        run: |
          bun lint || echo "Lint may fail after update"
          bunx turbo typecheck || echo "Typecheck may fail after update"
        continue-on-error: true
      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git checkout -b "deps/update-$(date +%Y%m%d)"
          git add -A
          git commit -m "deps: update dependencies $(date +%Y-%m-%d)"
          git push origin "deps/update-$(date +%Y%m%d)"
          gh pr create \
            --repo "${{ github.repository }}" \
            --title "deps: update dependencies $(date +%Y-%m-%d)" \
            --body "Automated dependency update. Please review and merge." \
            --base main \
            --head "deps/update-$(date +%Y%m%d)"
        continue-on-error: true

  update-github-actions:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check for action updates
        run: |
          # Find all used actions and their versions
          grep -r "uses:" .github/workflows/ | grep -oP 'uses:\s*\K[^@]+' | sort -u
          echo "::notice::GitHub Actions versions checked"
        continue-on-error: true
