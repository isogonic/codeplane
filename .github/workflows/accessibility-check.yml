name: accessibility-check

description: |
  Checks for accessibility issues in the web app and site.
  Ensures WCAG compliance and good accessibility practices.

on:
  push:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/ui/**"
      - "site/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/app/**"
      - "packages/ui/**"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-a11y:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build for a11y check
        run: |
          cd packages/app
          bun run build
      - name: Check for common a11y issues
        run: |
          # Check for alt text on images
          if grep -r "<img" --include="*.tsx" --include="*.html" packages/app/src site/app; then
            echo "::notice::Images found — check for alt text"
          fi
          # Check for aria labels
          if grep -r "aria-label" --include="*.tsx" packages/app/src site/app; then
            echo "::notice::aria-label attributes found"
          else
            echo "::warning::No aria-label attributes found"
          fi
          # Check for button types
          if grep -r "<button" --include="*.tsx" packages/app/src; then
            echo "::notice::Buttons found"
          fi
        continue-on-error: true
      - name: Check for semantic HTML
        run: |
          # Check for semantic elements
          if grep -r "<main\|<header\|<footer\|<nav\|<article\|<section" --include="*.tsx" packages/app/src; then
            echo "::notice::Semantic HTML elements found"
          else
            echo "::warning::No semantic HTML elements found"
          fi
        continue-on-error: true
      - name: Check for focus management
        run: |
          if grep -r "tabIndex" --include="*.tsx" packages/app/src; then
            echo "::notice::tabIndex found"
          fi
        continue-on-error: true

  a11y-report:
    needs: [check-a11y]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Generate accessibility report
        run: |
          echo "## Accessibility Report" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility check: ${{ needs.check-a11y.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Manual review recommended for full WCAG compliance." >> $GITHUB_STEP_SUMMARY
