name: "Setup Bun"
description: "Setup Bun with caching and install dependencies"
inputs:
  install-flags:
    description: "Additional flags to pass to 'bun install'"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    # Fast path: if a bun is already on PATH (self-hosted runners pre-provision
    # one at /usr/local/bin/bun), reuse it. Records an output the rest of the
    # workflow can rely on and short-circuits any install work.
    - name: Reuse pre-installed bun
      id: existing-bun
      shell: bash
      run: |
        set -euo pipefail
        if command -v bun >/dev/null 2>&1; then
          echo "bun already available at $(command -v bun) — version $(bun --version)"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "bun_path=$(command -v bun)" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
        fi

    # Robust install for runners without a system bun (e.g. GitHub-hosted
    # ubuntu-latest used by the release workflows). Uses the official action,
    # which correctly resolves the platform asset and adds bun to PATH. We pin
    # the version to the repo's packageManager field so CI matches local dev.
    - name: Resolve pinned bun version
      id: bun-version
      if: steps.existing-bun.outputs.found != 'true'
      shell: bash
      run: |
        set -euo pipefail
        V="$(node -p "require('./package.json').packageManager.split('@')[1]")"
        echo "version=${V}" >> "$GITHUB_OUTPUT"

    - name: Setup Bun (official)
      if: steps.existing-bun.outputs.found != 'true'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.bun-version.outputs.version }}

    - name: Setup Python for node-gyp
      shell: bash
      run: |
        set -euo pipefail
        python_cmd="$(command -v python3 || command -v python)"
        python_root="$RUNNER_TEMP/node-gyp-python"
        "$python_cmd" -m venv "$python_root"
        python_bin="$python_root/bin/python"
        [ -x "$python_bin" ] || python_bin="$python_root/Scripts/python.exe"
        "$python_bin" -m pip install --disable-pip-version-check setuptools
        [ -d "$python_root/bin" ] && echo "$python_root/bin" >> "$GITHUB_PATH"
        [ -d "$python_root/Scripts" ] && echo "$python_root/Scripts" >> "$GITHUB_PATH"
        {
          echo "PYTHON=$python_bin"
          echo "NODE_GYP_FORCE_PYTHON=$python_bin"
          echo "npm_config_python=$python_bin"
        } >> "$GITHUB_ENV"

    - name: Use local Node headers for node-gyp
      shell: bash
      run: |
        set -euo pipefail
        status=0
        node_root=$(node <<'EOF'
        const fs = require("fs")
        const path = require("path")

        let current = path.dirname(process.execPath)
        while (true) {
          if (fs.existsSync(path.join(current, "include", "node", "node.h"))) {
            process.stdout.write(current)
            process.exit(0)
          }
          const parent = path.dirname(current)
          if (parent === current) {
            process.exit(2)
          }
          current = parent
        }
        EOF
        ) || status=$?
        if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
          exit "$status"
        fi
        if [ -z "$node_root" ]; then
          echo "No local Node headers found for $(node -p 'process.execPath'); using node-gyp defaults."
          exit 0
        fi
        {
          echo "npm_config_nodedir=$node_root"
          echo "node_gyp_nodedir=$node_root"
        } >> "$GITHUB_ENV"

    - name: Install dependencies
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted ${{ inputs.install-flags }}
        else
          bun install ${{ inputs.install-flags }}
        fi
      shell: bash
