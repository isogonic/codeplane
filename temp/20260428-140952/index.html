<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <style>
      :root {
        --bg: #0b0922;
        --panel: #181237;
        --panel-soft: #22164f;
        --text: #efeaff;
        --muted: #c1b9ff;
        --line: #3f2e7d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--text);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 10% 10%, #39237a 0%, transparent 45%),
          radial-gradient(circle at 90% 90%, #160a3d 0%, transparent 38%),
          linear-gradient(160deg, #070513, #160f36 45%, #0f0b24);
      }

      .shell {
        width: min(92vw, 920px);
        display: grid;
        grid-template-columns: minmax(0, 360px) minmax(220px, 280px);
        gap: 14px;
        align-items: start;
        padding: 1rem;
      }

      .panel {
        border: 2px solid #5340a1;
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 22px 30px rgba(0, 0, 0, 0.38);
      }

      .board-wrap {
        position: relative;
        overflow: hidden;
        padding: 0.8rem;
        background: #09071b;
      }

      #board {
        width: 100%;
        aspect-ratio: 1 / 2;
        image-rendering: pixelated;
        display: block;
        border: 3px solid #7759db;
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .hud {
        padding: 0.9rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        letter-spacing: 0.06em;
      }

      .stat {
        display: flex;
        justify-content: space-between;
        gap: 0.8rem;
        margin-bottom: 0.45rem;
      }

      .stat strong {
        color: #fff;
        font-family: Menlo, Consolas, Monaco, monospace;
      }

      .divider {
        height: 1px;
        background: #4a3b89;
        margin: 0.8rem 0;
      }

      .next {
        display: grid;
        justify-items: center;
        gap: 0.45rem;
      }

      #next {
        width: 120px;
        aspect-ratio: 1;
        image-rendering: pixelated;
        border: 1px solid #6f57c5;
        background: #0f0c2a;
      }

      .tips {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      kbd {
        display: inline-block;
        padding: 0.1rem 0.3rem;
        border: 1px solid #7d67d6;
        border-bottom-width: 3px;
        border-radius: 6px;
        margin-inline: 0.07rem;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(10, 8, 30, 0.84);
        color: #fff;
        font-size: 1.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        transition: 0.16s ease;
      }

      .overlay.show {
        opacity: 1;
      }

      .controls {
        display: none;
        margin-top: 0.8rem;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.45rem;
      }

      .controls button {
        border: 1px solid #7a63c7;
        border-bottom-width: 3px;
        background: #2d2566;
        color: #fff;
        border-radius: 10px;
        padding: 0.55rem 0.45rem;
        font: inherit;
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .controls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel board-wrap">
        <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>
        <div id="status" class="overlay"></div>
      </section>

      <aside class="panel hud">
        <h1>Tetris</h1>
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Lines</span><strong id="lines">0</strong></div>
        <div class="stat"><span>Level</span><strong id="level">1</strong></div>
        <div class="stat"><span>State</span><strong id="state">Ready</strong></div>

        <div class="divider"></div>

        <div class="next">
          <h2 style="margin: 0; font-size: 1rem">Next</h2>
          <canvas id="next" width="80" height="80" aria-label="Next piece"></canvas>
        </div>

        <div class="divider"></div>

        <p class="tips">
          <strong>Controls</strong><br />
          <kbd>←</kbd><kbd>→</kbd> move
          <br />
          <kbd>↑</kbd> rotate
          <br />
          <kbd>↓</kbd> soft drop
          <br />
          <kbd>Space</kbd> hard drop
          <br />
          <kbd>P</kbd> pause
          <br />
          <kbd>R</kbd> restart
        </p>

        <div class="controls">
          <button data-dir="-1">◄</button>
          <button data-rotate="1">↻</button>
          <button data-dir="1">►</button>
          <button data-drop="hard">⤓</button>
          <button data-pause="1" style="grid-column: 1 / 3">Pause / Resume</button>
          <button data-restart="1" style="grid-column: 3 / -1">Restart</button>
        </div>
      </aside>
    </main>

    <script>
      const board = document.getElementById("board")
      const context = board.getContext("2d")
      const nextCanvas = document.getElementById("next")
      const nextContext = nextCanvas.getContext("2d")
      const status = document.getElementById("status")
      const scoreLabel = document.getElementById("score")
      const linesLabel = document.getElementById("lines")
      const levelLabel = document.getElementById("level")
      const stateLabel = document.getElementById("state")

      const COLS = 10
      const ROWS = 20
      const SIZE = 30
      const MIN_DROP = 120
      const BASE_DROP = 880

      const shapes = {
        I: [[1, 1, 1, 1]],
        J: [[2, 0, 0], [2, 2, 2]],
        L: [[0, 0, 3], [3, 3, 3]],
        O: [[4, 4], [4, 4]],
        S: [[0, 5, 5], [5, 5, 0]],
        T: [[0, 6, 0], [6, 6, 6]],
        Z: [[7, 7, 0], [0, 7, 7]]
      }

      const colors = {
        I: "#3be6f4",
        J: "#3f62ff",
        L: "#ffb347",
        O: "#ffd94d",
        S: "#6bff95",
        T: "#bf61ff",
        Z: "#ff4f6d"
      }

      const names = Object.keys(shapes)

      const game = {
        board: emptyBoard(),
        score: 0,
        lines: 0,
        level: 1,
        dropAccumulator: 0,
        dropInterval: BASE_DROP,
        running: false,
        paused: false,
        over: false,
        piece: null,
        nextType: randomType()
      }

      const emptyRow = () => Array.from({ length: COLS }, () => 0)
      const emptyBoard = () => Array.from({ length: ROWS }, emptyRow)
      const randomType = () => names[Math.floor(Math.random() * names.length)]
      const cloneMatrix = (matrix) => matrix.map((row) => [...row])

      const createPiece = (type) => ({
        type,
        shape: cloneMatrix(shapes[type]),
        x: Math.floor(COLS / 2) - Math.ceil(shapes[type][0].length / 2),
        y: 0
      })

      const rotate = (shape) =>
        shape[0].map((_, i) => shape.map((row) => row[i]).reverse())

      const colorFor = (value) => {
        const map = {
          1: colors.I,
          2: colors.J,
          3: colors.L,
          4: colors.O,
          5: colors.S,
          6: colors.T,
          7: colors.Z
        }
        return map[value]
      }

      const collides = (piece) => {
        for (let y = 0; y < piece.shape.length; y++) {
          for (let x = 0; x < piece.shape[y].length; x++) {
            const value = piece.shape[y][x]
            if (!value) continue

            const px = piece.x + x
            const py = piece.y + y

            if (px < 0 || px >= COLS || py >= ROWS) return true
            if (py < 0) continue
            if (game.board[py][px]) return true
          }
        }

        return false
      }

      const lockPiece = () => {
        game.piece.shape.forEach((row, y) => {
          row.forEach((value, x) => {
            if (!value) return
            game.board[game.piece.y + y][game.piece.x + x] = value
          })
        })

        clearLines()
        spawnPiece()
      }

      const movePiece = (dx) => {
        if (!canInteract()) return

        game.piece.x += dx
        if (collides(game.piece)) game.piece.x -= dx
      }

      const rotatePiece = () => {
        if (!canInteract()) return

        const rotated = rotate(game.piece.shape)
        const original = game.piece.shape
        game.piece.shape = rotated

        const leftGap = -Math.min(0, game.piece.x)
        const rightGap = Math.max(0, game.piece.x + rotated[0].length - COLS)
        game.piece.x += leftGap
        game.piece.x -= rightGap

        if (!collides(game.piece)) return

        game.piece.shape = original
        game.piece.x -= leftGap
        game.piece.x += rightGap
      }

      const drop = () => {
        game.piece.y += 1
        if (!collides(game.piece)) return

        game.piece.y -= 1
        lockPiece()
      }

      const hardDrop = () => {
        if (!canInteract()) return

        while (!collides(game.piece)) game.piece.y += 1
        game.piece.y -= 1
        lockPiece()
      }

      const clearLines = () => {
        let count = 0
        for (let y = ROWS - 1; y >= 0; y--) {
          if (!game.board[y].every(Boolean)) continue

          game.board.splice(y, 1)
          game.board.unshift(emptyRow())
          y += 1
          count += 1
        }

        if (!count) return

        const points = [0, 40, 120, 360, 900][count]
        game.lines += count
        game.score += points * game.level
        game.level = Math.floor(game.lines / 10) + 1
        game.dropInterval = Math.max(MIN_DROP, BASE_DROP - (game.level - 1) * 65)

        scoreLabel.textContent = String(game.score)
        linesLabel.textContent = String(game.lines)
        levelLabel.textContent = String(game.level)
      }

      const canInteract = () => game.running && !game.paused && !game.over && game.piece

      const spawnPiece = () => {
        game.piece = createPiece(game.nextType)
        game.nextType = randomType()
        renderNext()

        if (collides(game.piece)) {
          game.over = true
          game.running = false
          status.textContent = "Game Over"
          status.classList.add("show")
          stateLabel.textContent = "Over"
          return
        }

        stateLabel.textContent = game.paused ? "Paused" : "Running"
      }

      const renderBoard = () => {
        context.clearRect(0, 0, board.width, board.height)
        context.fillStyle = "#09081f"
        context.fillRect(0, 0, board.width, board.height)

        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const value = game.board[y][x]
            paintCell(context, x, y, value)
          }
        }

        if (game.piece) {
          game.piece.shape.forEach((row, y) => {
            row.forEach((value, x) => {
              if (!value) return
              paintCell(context, game.piece.x + x, game.piece.y + y, value)
            })
          })
        }

        for (let x = 1; x < COLS; x++) {
          context.strokeStyle = "rgba(255,255,255,0.05)"
          context.beginPath()
          context.moveTo(x * SIZE, 0)
          context.lineTo(x * SIZE, board.height)
          context.stroke()
        }

        for (let y = 1; y < ROWS; y++) {
          context.strokeStyle = "rgba(255,255,255,0.05)"
          context.beginPath()
          context.moveTo(0, y * SIZE)
          context.lineTo(board.width, y * SIZE)
          context.stroke()
        }
      }

      const paintCell = (ctx, x, y, value) => {
        if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return

        const px = x * SIZE
        const py = y * SIZE
        const size = SIZE - 2

        ctx.fillStyle = value ? colorFor(value) : "transparent"
        ctx.strokeStyle = value ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.08)"

        ctx.fillRect(px + 1, py + 1, size, size)
        ctx.strokeRect(px + 1.5, py + 1.5, size - 1, size - 1)

        if (!value) return
        ctx.fillStyle = "rgba(255,255,255,0.24)"
        ctx.fillRect(px + 6, py + 8, size - 12, 5)
        ctx.fillRect(px + 6, py + 18, size - 12, 4)
      }

      const renderNext = () => {
        nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height)
        nextContext.fillStyle = "#0b082f"
        nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height)

        const shape = shapes[game.nextType]
        const unit = 16
        const ox = (4 - shape[0].length) * 8
        const oy = 16

        shape.forEach((row, y) => {
          row.forEach((value, x) => {
            if (!value) return
            const px = ox + x * unit
            const py = oy + y * unit
            nextContext.fillStyle = colorFor(value)
            nextContext.fillRect(px + 1, py + 1, unit - 2, unit - 2)
          })
        })
      }

      const setStatus = (message, visible) => {
        status.textContent = message
        status.classList.toggle("show", visible)
      }

      const loop = (time) => {
        if (!game.lastTime) game.lastTime = time
        const delta = time - game.lastTime
        game.lastTime = time

        if (canInteract()) {
          game.dropAccumulator += delta
          if (game.dropAccumulator >= game.dropInterval) {
            drop()
            game.dropAccumulator = 0
          }
        }

        renderBoard()
        requestAnimationFrame(loop)
      }

      const restart = () => {
        game.board = emptyBoard()
        game.score = 0
        game.lines = 0
        game.level = 1
        game.dropAccumulator = 0
        game.dropInterval = BASE_DROP
        game.running = true
        game.paused = false
        game.over = false
        game.lastTime = undefined
        game.piece = null
        game.nextType = randomType()

        scoreLabel.textContent = "0"
        linesLabel.textContent = "0"
        levelLabel.textContent = "1"

        spawnPiece()
        setStatus("", false)
        stateLabel.textContent = "Running"
      }

      document.addEventListener("keydown", (event) => {
        if (!game.running && event.key.toLowerCase() !== "r") return

        if (event.key === "r" || event.key === "R") {
          restart()
          return
        }

        if (event.key === "p" || event.key === "P") {
          if (game.over) return

          game.paused = !game.paused
          setStatus(game.paused ? "Paused" : "", game.paused)
          stateLabel.textContent = game.paused ? "Paused" : "Running"
          game.lastTime = performance.now()
          return
        }

        if (!canInteract()) return

        if (event.key === "ArrowLeft") {
          event.preventDefault()
          movePiece(-1)
          return
        }

        if (event.key === "ArrowRight") {
          event.preventDefault()
          movePiece(1)
          return
        }

        if (event.key === "ArrowUp") {
          event.preventDefault()
          rotatePiece()
          return
        }

        if (event.key === "ArrowDown") {
          event.preventDefault()
          drop()
          return
        }

        if (event.key === " ") {
          event.preventDefault()
          hardDrop()
          return
        }
      })

        document.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          if (!game.running && !button.dataset.restart) return

          if (button.dataset.dir) {
            movePiece(Number(button.dataset.dir))
          }

          if (button.dataset.rotate) rotatePiece()

          if (button.dataset.drop === "hard") hardDrop()

          if (button.dataset.pause) {
            if (game.over) return

            game.paused = !game.paused
            setStatus(game.paused ? "Paused" : "", game.paused)
            stateLabel.textContent = game.paused ? "Paused" : "Running"
            game.lastTime = performance.now()
            return
          }

          if (button.dataset.restart) {
            restart()
          }
        })
      })

      restart()
      setStatus("Ready", true)
      requestAnimationFrame(loop)
    </script>
  </body>
</html>
