<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header>
        <h1>Tetris</h1>
        <p>Arrows / WASD to move and rotate, Space to hard drop.</p>
      </header>

      <section class="play-area">
        <canvas id="playfield" width="300" height="600" aria-label="Tetris playfield"></canvas>
        <aside class="side-panel">
          <h2>Score</h2>
          <div class="metric">Points</div>
          <div id="points" class="value">0</div>
          <div class="metric">Lines</div>
          <div id="lines" class="value">0</div>
          <div class="metric">Level</div>
          <div id="level" class="value">1</div>
          <button id="restart" type="button">Restart</button>
          <div id="status" class="status"></div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
